<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layouts/admin :: head('Trashed Parcel Fares')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Trashed Parcel Fares</h2>
        <a th:href="@{/admin/fare/parcel}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Zone ID</th>
                    <th>Base Fare</th>
                    <th>Per Km</th>
                    <th>Deleted At</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="fare, iter : ${fares}">
                    <td th:text="${iter.count}"></td>
                    <td th:text="${fare.zoneId}"></td>
                    <td th:text="${fare.baseFare}"></td>
                    <td th:text="${fare.baseFarePerKm}"></td>
                    <td th:text="${fare.deletedAt}"></td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/fare/parcel/' + ${fare.id} + '/restore'}"
                               class="btn btn-sm btn-outline-success"
                               onclick="return confirm('Restore this fare?')">
                                <i class="bi bi-arrow-counterclockwise"></i>
                            </a>
                            <form th:action="@{'/admin/fare/parcel/' + ${fare.id} + '/permanent'}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Permanently delete this fare? This cannot be undone.')">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${fares.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">No trashed parcel fares.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
