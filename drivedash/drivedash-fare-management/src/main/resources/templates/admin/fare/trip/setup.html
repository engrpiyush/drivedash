<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Trip Fare Setup')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Trip Fare Setup</h2>
        <a th:href="@{/admin/fare/trip}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form id="trip-fare-form"
          th:action="@{'/admin/fare/trip/' + ${zone.id} + '/setup'}"
          method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="card">
            <div class="card-body">
                <h5 class="text-primary text-uppercase mb-4">
                    Fare Default Price (<span th:text="${zone.name}"></span> Zone)
                </h5>

                <!-- Category-wise fare toggle -->
                <div class="mb-4">
                    <h6 class="fw-medium mb-2">Use Category-Wise Different Fare?</h6>
                    <div class="d-flex gap-4">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="categoryWiseFare"
                                   id="cwfYes" value="true"
                                   th:checked="${defaultFare != null and defaultFare.categoryWiseFare}"/>
                            <label class="form-check-label" for="cwfYes">Yes</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="categoryWiseFare"
                                   id="cwfNo" value="false"
                                   th:checked="${defaultFare == null or !defaultFare.categoryWiseFare}"/>
                            <label class="form-check-label" for="cwfNo">No</label>
                        </div>
                    </div>
                </div>

                <!-- Zone-wide default fare fields -->
                <div class="row gy-4 mb-4">
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Base Fare</label>
                        <input type="number" class="form-control" name="baseFare" step="0.01" min="0"
                               th:value="${defaultFare != null ? defaultFare.baseFare : 0}" required/>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Fare Per Km</label>
                        <input type="number" class="form-control" name="baseFarePerKm" step="0.01" min="0"
                               th:value="${defaultFare != null ? defaultFare.baseFarePerKm : 0}" required/>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Waiting Fee (Per Min)</label>
                        <input type="number" class="form-control" name="waitingFeePerMin" step="0.01" min="0"
                               th:value="${defaultFare != null ? defaultFare.waitingFeePerMin : 0}" required/>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Cancellation Fee (%)</label>
                        <input type="number" class="form-control" name="cancellationFeePercent"
                               step="0.01" min="0" max="100"
                               th:value="${defaultFare != null ? defaultFare.cancellationFeePercent : 0}" required/>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Min Cancellation Fee</label>
                        <input type="number" class="form-control" name="minCancellationFee" step="0.01" min="0"
                               th:value="${defaultFare != null ? defaultFare.minCancellationFee : 0}" required/>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Idle Fee (Per Min)</label>
                        <input type="number" class="form-control" name="idleFeePerMin" step="0.01" min="0"
                               th:value="${defaultFare != null ? defaultFare.idleFeePerMin : 0}" required/>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Trip Delay Fee (Per Min)</label>
                        <input type="number" class="form-control" name="tripDelayFeePerMin" step="0.01" min="0"
                               th:value="${defaultFare != null ? defaultFare.tripDelayFeePerMin : 0}" required/>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Penalty Fee for Cancel</label>
                        <input type="number" class="form-control" name="penaltyFeeForCancel" step="0.01" min="0"
                               th:value="${defaultFare != null ? defaultFare.penaltyFeeForCancel : 0}" required/>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Fee Add to Next</label>
                        <input type="number" class="form-control" name="feeAddToNext" step="0.01" min="0"
                               th:value="${defaultFare != null ? defaultFare.feeAddToNext : 0}" required/>
                    </div>
                </div>

                <!-- Per-category fare table (shown only when categoryWiseFare = yes) -->
                <div id="category-fare-section"
                     th:style="${defaultFare == null or !defaultFare.categoryWiseFare} ? 'display:none' : ''">
                    <h5 class="text-primary text-uppercase mb-3">Category Wise Fare</h5>

                    <th:block th:if="${categories.isEmpty()}">
                        <p class="text-muted">No vehicle categories available.</p>
                    </th:block>

                    <div class="table-responsive border rounded mb-3" th:if="${!categories.isEmpty()}">
                        <table class="table table-bordered align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>Fare</th>
                                <th th:each="cat : ${categories}" th:text="${cat.name}"></th>
                            </tr>
                            </thead>
                            <tbody>
                            <!-- Build hidden inputs for categoryFares list via JS -->
                            <tr>
                                <td class="fw-semibold text-primary">Base Fare</td>
                                <td th:each="cat, ci : ${categories}">
                                    <input type="number" step="0.01" min="0"
                                           th:name="'categoryFares[' + ${ci.index} + '].baseFare'"
                                           class="form-control form-control-sm cat-fare-input"
                                           th:value="${#lists.isEmpty(categoryFares)} ? 0 : (categoryFares[__${ci.index}__] != null ? categoryFares[__${ci.index}__].baseFare : 0)"/>
                                    <input type="hidden"
                                           th:name="'categoryFares[' + ${ci.index} + '].categoryId'"
                                           th:value="${cat.id}"/>
                                </td>
                            </tr>
                            <tr>
                                <td class="fw-semibold text-primary">Fare Per Km</td>
                                <td th:each="cat, ci : ${categories}">
                                    <input type="number" step="0.01" min="0"
                                           th:name="'categoryFares[' + ${ci.index} + '].baseFarePerKm'"
                                           class="form-control form-control-sm cat-fare-input"
                                           th:value="${#lists.isEmpty(categoryFares)} ? 0 : (categoryFares[__${ci.index}__] != null ? categoryFares[__${ci.index}__].baseFarePerKm : 0)"/>
                                </td>
                            </tr>
                            <tr>
                                <td class="fw-semibold text-primary">Waiting Fee/Min</td>
                                <td th:each="cat, ci : ${categories}">
                                    <input type="number" step="0.01" min="0"
                                           th:name="'categoryFares[' + ${ci.index} + '].waitingFeePerMin'"
                                           class="form-control form-control-sm cat-fare-input"
                                           th:value="${#lists.isEmpty(categoryFares)} ? 0 : (categoryFares[__${ci.index}__] != null ? categoryFares[__${ci.index}__].waitingFeePerMin : 0)"/>
                                </td>
                            </tr>
                            <tr>
                                <td class="fw-semibold text-primary">Cancellation Fee (%)</td>
                                <td th:each="cat, ci : ${categories}">
                                    <input type="number" step="0.01" min="0" max="100"
                                           th:name="'categoryFares[' + ${ci.index} + '].cancellationFeePercent'"
                                           class="form-control form-control-sm cat-fare-input"
                                           th:value="${#lists.isEmpty(categoryFares)} ? 0 : (categoryFares[__${ci.index}__] != null ? categoryFares[__${ci.index}__].cancellationFeePercent : 0)"/>
                                </td>
                            </tr>
                            <tr>
                                <td class="fw-semibold text-primary">Min Cancellation Fee</td>
                                <td th:each="cat, ci : ${categories}">
                                    <input type="number" step="0.01" min="0"
                                           th:name="'categoryFares[' + ${ci.index} + '].minCancellationFee'"
                                           class="form-control form-control-sm cat-fare-input"
                                           th:value="${#lists.isEmpty(categoryFares)} ? 0 : (categoryFares[__${ci.index}__] != null ? categoryFares[__${ci.index}__].minCancellationFee : 0)"/>
                                </td>
                            </tr>
                            <tr>
                                <td class="fw-semibold text-primary">Idle Fee/Min</td>
                                <td th:each="cat, ci : ${categories}">
                                    <input type="number" step="0.01" min="0"
                                           th:name="'categoryFares[' + ${ci.index} + '].idleFeePerMin'"
                                           class="form-control form-control-sm cat-fare-input"
                                           th:value="${#lists.isEmpty(categoryFares)} ? 0 : (categoryFares[__${ci.index}__] != null ? categoryFares[__${ci.index}__].idleFeePerMin : 0)"/>
                                </td>
                            </tr>
                            <tr>
                                <td class="fw-semibold text-primary">Trip Delay Fee/Min</td>
                                <td th:each="cat, ci : ${categories}">
                                    <input type="number" step="0.01" min="0"
                                           th:name="'categoryFares[' + ${ci.index} + '].tripDelayFeePerMin'"
                                           class="form-control form-control-sm cat-fare-input"
                                           th:value="${#lists.isEmpty(categoryFares)} ? 0 : (categoryFares[__${ci.index}__] != null ? categoryFares[__${ci.index}__].tripDelayFeePerMin : 0)"/>
                                </td>
                            </tr>
                            <tr>
                                <td class="fw-semibold text-primary">Penalty Fee for Cancel</td>
                                <td th:each="cat, ci : ${categories}">
                                    <input type="number" step="0.01" min="0"
                                           th:name="'categoryFares[' + ${ci.index} + '].penaltyFeeForCancel'"
                                           class="form-control form-control-sm cat-fare-input"
                                           th:value="${#lists.isEmpty(categoryFares)} ? 0 : (categoryFares[__${ci.index}__] != null ? categoryFares[__${ci.index}__].penaltyFeeForCancel : 0)"/>
                                </td>
                            </tr>
                            <tr>
                                <td class="fw-semibold text-primary">Fee Add to Next</td>
                                <td th:each="cat, ci : ${categories}">
                                    <input type="number" step="0.01" min="0"
                                           th:name="'categoryFares[' + ${ci.index} + '].feeAddToNext'"
                                           class="form-control form-control-sm cat-fare-input"
                                           th:value="${#lists.isEmpty(categoryFares)} ? 0 : (categoryFares[__${ci.index}__] != null ? categoryFares[__${ci.index}__].feeAddToNext : 0)"/>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-3">
                    <button type="submit" class="btn btn-primary">Save Fare</button>
                </div>
            </div>
        </div>
    </form>
</main>

<script>
    "use strict";
    const cwfYes = document.getElementById('cwfYes');
    const cwfNo  = document.getElementById('cwfNo');
    const catSection = document.getElementById('category-fare-section');
    const catInputs  = catSection ? catSection.querySelectorAll('.cat-fare-input') : [];

    function toggleCategorySection() {
        const show = cwfYes.checked;
        catSection.style.display = show ? '' : 'none';
        catInputs.forEach(inp => { inp.required = show; });
    }

    cwfYes.addEventListener('change', toggleCategorySection);
    cwfNo.addEventListener('change', toggleCategorySection);
</script>
</body>
</html>
