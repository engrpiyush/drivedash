<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Add Vehicle')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between mb-4">
        <h2>Add New Vehicle</h2>
        <a th:href="@{/admin/vehicles}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form id="vehicle_form" th:action="@{/admin/vehicles}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="card mb-3">
            <div class="card-header"><h5 class="mb-0">Vehicle Information</h5></div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-sm-6 col-xl-4">
                        <label class="form-label">Brand *</label>
                        <select id="brandSelect" name="brandId" class="form-select" required
                                onchange="loadModels(this.value)">
                            <option value="">Select brand</option>
                            <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"></option>
                        </select>
                    </div>
                    <div class="col-sm-6 col-xl-4">
                        <label class="form-label">Model *</label>
                        <select id="modelSelect" name="modelId" class="form-select" required>
                            <option value="">Select brand first</option>
                        </select>
                    </div>
                    <div class="col-sm-6 col-xl-4">
                        <label class="form-label">Category *</label>
                        <select name="categoryId" class="form-select" required>
                            <option value="">Select category</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>
                    <div class="col-sm-6 col-xl-4">
                        <label class="form-label">Licence Plate Number *</label>
                        <input type="text" name="licencePlateNumber" class="form-control"
                               placeholder="e.g. DB-3212" required/>
                    </div>
                    <div class="col-sm-6 col-xl-4">
                        <label class="form-label">Licence Expire Date *</label>
                        <input type="date" name="licenceExpireDate" class="form-control" required/>
                    </div>
                    <div class="col-sm-6 col-xl-4">
                        <label class="form-label">VIN Number</label>
                        <input type="text" name="vinNumber" class="form-control"
                               placeholder="e.g. 1HGBH41JXMN109186"/>
                    </div>
                    <div class="col-sm-6 col-xl-4">
                        <label class="form-label">Transmission</label>
                        <input type="text" name="transmission" class="form-control" placeholder="e.g. AMT"/>
                    </div>
                    <div class="col-sm-6 col-xl-4">
                        <label class="form-label">Fuel Type *</label>
                        <select name="fuelType" class="form-select" required>
                            <option value="">Select fuel type</option>
                            <option th:each="f : ${fuelTypes}" th:value="${f}" th:text="${f.label()}"></option>
                        </select>
                    </div>
                    <div class="col-sm-6 col-xl-4">
                        <label class="form-label">Ownership *</label>
                        <select name="ownership" class="form-select" required>
                            <option value="">Select owner</option>
                            <option th:each="o : ${ownerships}" th:value="${o}" th:text="${o}"></option>
                        </select>
                    </div>
                    <div class="col-sm-6 col-xl-4">
                        <label class="form-label">Driver *</label>
                        <select id="driverSelect" name="driverId" class="form-select" required>
                            <option value="">Loading drivers...</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header"><h5 class="mb-0">Upload Documents</h5></div>
            <div class="card-body">
                <input type="file" name="documents" class="form-control" multiple
                       accept=".pdf,.png,.jpg,.jpeg,.xlsx,.xls,.csv"/>
                <small class="text-muted">Accepted: PDF, images, spreadsheets. Max 10MB each.</small>
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-primary">Submit Vehicle</button>
        </div>
    </form>
</main>

<script>
    "use strict";

    // Load models when brand changes
    function loadModels(brandId) {
        const sel = document.getElementById('modelSelect');
        sel.innerHTML = '<option value="">Loading...</option>';
        if (!brandId) { sel.innerHTML = '<option value="">Select brand first</option>'; return; }
        fetch('/admin/vehicle/attribute-setup/model/ajax/' + brandId)
            .then(r => r.json())
            .then(data => {
                sel.innerHTML = '<option value="">Select model</option>' +
                    data.map(m => `<option value="${m.id}">${m.text}</option>`).join('');
            });
    }

    // Load drivers on page load
    window.addEventListener('load', function () {
        fetch('/admin/vehicles/ajax/drivers')
            .then(r => r.json())
            .then(data => {
                const sel = document.getElementById('driverSelect');
                sel.innerHTML = '<option value="">Select driver</option>' +
                    data.map(d => `<option value="${d.id}">${d.text}</option>`).join('');
            });
    });
</script>
</body>
</html>
