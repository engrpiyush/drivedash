<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Edit Category')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
    <div class="d-flex justify-content-between mb-4">
        <h2>Edit Category</h2>
        <a th:href="@{/admin/vehicle/attribute-setup/category}" class="btn btn-outline-secondary btn-sm">Back</a>
    </div>
    <div class="card">
        <div class="card-body">
            <form th:action="@{'/admin/vehicle/attribute-setup/category/' + ${category.id}}"
                  method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="_method" value="PUT"/>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Category Name</label>
                        <input type="text" name="name" class="form-control" th:value="${category.name}" required/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Description</label>
                        <input type="text" name="description" class="form-control"
                               th:value="${category.description}" required/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Type</label>
                        <select name="type" class="form-select" required>
                            <option value="car" th:selected="${category.type == 'car'}">Car</option>
                            <option value="motor_bike" th:selected="${category.type == 'motor_bike'}">Motor Bike</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Image (leave blank to keep current)</label>
                        <input type="file" name="image" class="form-control" accept="image/png"/>
                        <img th:if="${category.image != null}" th:src="@{'/uploads/' + ${category.image}}"
                             alt="current" class="mt-2 rounded" style="height:60px;"/>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Update Category</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
