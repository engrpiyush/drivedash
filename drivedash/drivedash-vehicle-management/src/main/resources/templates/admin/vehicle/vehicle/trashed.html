<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Deleted Vehicles')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
    <div class="d-flex justify-content-between mb-4">
        <h2>Deleted Vehicles</h2>
        <a th:href="@{/admin/vehicles}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr><th>#</th><th>Ref</th><th>License</th><th>Fuel</th><th>Deleted At</th><th class="text-center">Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="v, iter : ${vehicles.content}">
                    <td th:text="${iter.count}"></td>
                    <td th:text="${v.refId}"></td>
                    <td th:text="${v.licencePlateNumber}"></td>
                    <td th:text="${v.fuelType}"></td>
                    <td th:text="${#temporals.format(v.deletedAt, 'dd MMM yyyy')}"></td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/vehicles/' + ${v.id} + '/restore'}"
                               class="btn btn-sm btn-outline-success"
                               onclick="return confirm('Restore?')">
                                <i class="bi bi-arrow-repeat"></i> Restore
                            </a>
                            <form th:action="@{'/admin/vehicles/' + ${v.id} + '/permanent'}"
                                  method="post" class="d-inline">
                                <input type="hidden" name="_method" value="DELETE"/>
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Permanently delete?')">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${vehicles.content.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">No deleted vehicles.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
