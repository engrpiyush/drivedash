<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layouts/admin :: head('Vehicle Categories')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <ul class="nav nav-tabs mb-4">
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/vehicle/attribute-setup/brand}">Brands</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/admin/vehicle/attribute-setup/category}">Categories</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/vehicle/attribute-setup/model}">Models</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/vehicles}">Vehicles</a></li>
    </ul>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Add Category -->
    <div class="card mb-4">
        <div class="card-header"><h5 class="mb-0">Add New Category</h5></div>
        <div class="card-body">
            <form th:action="@{/admin/vehicle/attribute-setup/category}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Category Name *</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Sedan" required/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Description *</label>
                        <input type="text" name="description" class="form-control" required/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Type *</label>
                        <select name="type" class="form-select" required>
                            <option value="">Select type</option>
                            <option value="car">Car</option>
                            <option value="motor_bike">Motor Bike</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Image (PNG)</label>
                        <input type="file" name="image" class="form-control" accept="image/png"/>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Add Category</button>
                </div>
            </form>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <h5>Category List</h5>
        <a sec:authorize="hasRole('SUPER_ADMIN')"
           th:href="@{/admin/vehicle/attribute-setup/category/trashed}"
           class="btn btn-sm btn-outline-warning"><i class="bi bi-recycle"></i> Trashed</a>
    </div>

    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr><th>#</th><th>Image</th><th>Name</th><th>Type</th><th>Status</th><th class="text-center">Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="cat, iter : ${categories.content}">
                    <td th:text="${categories.number * categories.size + iter.count}"></td>
                    <td>
                        <img th:if="${cat.image != null}" th:src="@{'/uploads/' + ${cat.image}}"
                             alt="cat" style="height:40px;width:40px;object-fit:cover;" class="rounded"/>
                        <span th:unless="${cat.image != null}" class="text-muted">—</span>
                    </td>
                    <td th:text="${cat.name}"></td>
                    <td th:text="${cat.type}"></td>
                    <td>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" th:checked="${cat.active}"
                                   th:data-href="@{/admin/vehicle/attribute-setup/category/status(id=${cat.id},status=${!cat.active},currentStatus=${status})}"
                                   onclick="window.location=this.dataset.href"/>
                        </div>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/vehicle/attribute-setup/category/' + ${cat.id} + '/edit'}"
                               class="btn btn-sm btn-outline-info"><i class="bi bi-pencil-fill"></i></a>
                            <form th:action="@{'/admin/vehicle/attribute-setup/category/' + ${cat.id}}"
                                  method="post" class="d-inline">
                                <input type="hidden" name="_method" value="DELETE"/>
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete?')">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${categories.content.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">No categories found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
