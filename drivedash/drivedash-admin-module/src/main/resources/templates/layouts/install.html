<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — DriveDash Setup'">DriveDash Setup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; min-height: 100vh; }
        .install-card { max-width: 680px; margin: 3rem auto; }
        .step-indicator .step { width: 32px; height: 32px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: .8rem; font-weight: 700; }
        .step.done { background: #198754; color: #fff; }
        .step.active { background: #0d6efd; color: #fff; }
        .step.pending { background: #dee2e6; color: #6c757d; }
        .req-row { display: flex; justify-content: space-between; padding: .45rem 0;
            border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body>
<div class="container">
    <div class="install-card card shadow-sm">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <h4 class="fw-bold text-primary"><i class="bi bi-gear-fill me-2"></i>DriveDash Setup</h4>
            </div>
            <th:block th:replace="${content}"/>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
