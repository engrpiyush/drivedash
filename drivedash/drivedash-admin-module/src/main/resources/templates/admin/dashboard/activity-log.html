<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Activity Log')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <h2 class="mb-3">Activity Log</h2>

    <!-- ── Filters ──────────────────────────────────────────────────────── -->
    <form th:action="@{/admin/log}" method="get" class="row g-2 mb-3">
        <div class="col-md-3">
            <input type="text" name="logableType" class="form-control"
                   placeholder="Entity type (e.g. User)"
                   th:value="${filter.logableType}"/>
        </div>
        <div class="col-md-3">
            <input type="text" name="logableId" class="form-control"
                   placeholder="Entity ID (UUID)"
                   th:value="${filter.logableId}"/>
        </div>
        <div class="col-md-3">
            <select name="userType" class="form-select">
                <option value="">All User Types</option>
                <option value="super_admin"  th:selected="${filter.userType == 'super_admin'}">Super Admin</option>
                <option value="admin"        th:selected="${filter.userType == 'admin'}">Admin</option>
                <option value="employee"     th:selected="${filter.userType == 'employee'}">Employee</option>
            </select>
        </div>
        <div class="col-md-1">
            <button type="submit" class="btn btn-primary w-100">Filter</button>
        </div>
        <div class="col-md-1">
            <a th:href="@{/admin/log}" class="btn btn-outline-secondary w-100">Reset</a>
        </div>
    </form>

    <!-- ── Log Table ─────────────────────────────────────────────────────── -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Entity</th>
                        <th>Action</th>
                        <th>Entity ID</th>
                        <th>Edited By</th>
                        <th>User Type</th>
                        <th>When</th>
                        <th>Changes</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="log, iter : ${logs.content}">
                        <td th:text="${logs.number * logs.size + iter.count}"></td>
                        <td th:text="${log.logableType}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${log.action == 'CREATE'} ? 'bg-success'
                                                : (${log.action == 'DELETE'} ? 'bg-danger'
                                                : (${log.action == 'LOGIN'} ? 'bg-primary'
                                                : (${log.action == 'LOGOUT'} ? 'bg-secondary'
                                                : 'bg-warning text-dark')))"
                                  th:text="${log.action ?: '—'}">
                            </span>
                        </td>
                        <td>
                            <code th:text="${log.logableId ?: '—'}"></code>
                        </td>
                        <td>
                            <code th:text="${log.editedBy ?: '—'}"></code>
                        </td>
                        <td>
                            <span class="badge bg-secondary" th:text="${log.userType ?: '—'}"></span>
                        </td>
                        <td th:text="${log.createdAt != null} ? ${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm')} : '—'"></td>
                        <td>
                            <button class="btn btn-sm btn-outline-info"
                                    data-bs-toggle="modal"
                                    th:data-bs-target="${'#diffModal-' + log.id}"
                                    th:disabled="${log.beforeState == null and log.afterState == null}">
                                View
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${logs.isEmpty()}">
                        <td colspan="8" class="text-center text-muted py-4">No log entries found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ── Pagination ────────────────────────────────────────────────────── -->
    <nav th:if="${logs.totalPages > 1}" class="mt-3">
        <ul class="pagination">
            <li class="page-item" th:classappend="${logs.first} ? disabled">
                <a class="page-link"
                   th:href="@{/admin/log(logableType=${filter.logableType},page=${logs.number - 1})}">
                    &laquo;
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, logs.totalPages - 1)}"
                th:classappend="${i == logs.number} ? active">
                <a class="page-link"
                   th:href="@{/admin/log(logableType=${filter.logableType},page=${i})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${logs.last} ? disabled">
                <a class="page-link"
                   th:href="@{/admin/log(logableType=${filter.logableType},page=${logs.number + 1})}">
                    &raquo;
                </a>
            </li>
        </ul>
    </nav>

    <!-- ── Diff Modals (one per log entry) ───────────────────────────────── -->
    <div th:each="log : ${logs.content}">
        <div class="modal fade" th:id="${'diffModal-' + log.id}" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"
                            th:text="${(log.action ?: '') + ' – ' + log.logableType + ' @ ' + (log.createdAt != null ? #temporals.format(log.createdAt,'yyyy-MM-dd HH:mm') : '')}">
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body row">
                        <div class="col-6">
                            <h6 class="text-danger">Before</h6>
                            <pre class="bg-light p-2 rounded small"
                                 th:text="${log.beforeState != null} ? ${log.beforeState} : '—'">–</pre>
                        </div>
                        <div class="col-6">
                            <h6 class="text-success">After</h6>
                            <pre class="bg-light p-2 rounded small"
                                 th:text="${log.afterState != null} ? ${log.afterState} : '—'">–</pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

</body>
</html>
