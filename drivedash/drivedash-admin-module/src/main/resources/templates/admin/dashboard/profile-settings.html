<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Profile Settings')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <h2 class="mb-4">Profile Settings</h2>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- ── Profile info form ───────────────────────────────────────────── -->
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold">Personal Information</div>
                <div class="card-body">
                    <form th:action="@{/admin/settings/update}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">First Name</label>
                            <input type="text" class="form-control" name="firstName"
                                   th:value="${user.firstName}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Last Name</label>
                            <input type="text" class="form-control" name="lastName"
                                   th:value="${user.lastName}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control bg-light"
                                   th:value="${user.email}" disabled readonly>
                            <div class="form-text">Email cannot be changed.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="tel" class="form-control" name="phone"
                                   th:value="${user.phone}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Role</label>
                            <input type="text" class="form-control bg-light"
                                   th:value="${user.userType}" disabled readonly>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i> Update Profile
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- ── Change password form ────────────────────────────────────────── -->
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold">Change Password</div>
                <div class="card-body">
                    <form th:action="@{/admin/settings/change-password}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Current Password</label>
                            <input type="password" class="form-control" name="currentPassword"
                                   required autocomplete="current-password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">New Password</label>
                            <input type="password" class="form-control" name="newPassword"
                                   required minlength="8" autocomplete="new-password">
                            <div class="form-text">Minimum 8 characters.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Confirm New Password</label>
                            <input type="password" class="form-control" name="confirmPassword"
                                   required minlength="8" autocomplete="new-password">
                        </div>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-lock me-1"></i> Change Password
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
