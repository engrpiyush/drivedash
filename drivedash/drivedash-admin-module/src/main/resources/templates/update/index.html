<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layouts/admin :: head('Software Update')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
    <div class="d-flex align-items-center mb-4">
        <h2 class="fw-bold mb-0">Software Update</h2>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}">Done</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-info-circle me-2 text-primary"></i>Version Info</h5>
                    <div class="d-flex justify-content-between py-2 border-bottom">
                        <span class="text-muted">Current DB Version</span>
                        <span class="fw-semibold" th:text="${currentVersion}">1.0</span>
                    </div>
                    <div class="d-flex justify-content-between py-2">
                        <span class="text-muted">Pending Migrations</span>
                        <span class="fw-semibold" th:text="${pendingCount}">0</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-arrow-up-circle me-2 text-success"></i>Apply Migrations</h5>
                    <p class="text-muted small mb-3">
                        Run pending Flyway migration scripts to update the database schema to the latest version.
                    </p>
                    <form action="/admin/update/apply" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-success"
                                th:disabled="${pendingCount == 0}"
                                onclick="return confirm('Apply pending migrations?')">
                            <i class="bi bi-play-fill me-1"></i>
                            Run Migrations <span th:if="${pendingCount > 0}" class="badge bg-white text-success ms-1" th:text="${pendingCount}">0</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
