<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<th:block th:fragment="sidebar">

    <!-- ── Top navigation ─────────────────────────────────────────────── -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top px-3">
        <a class="navbar-brand" th:href="@{/admin/dashboard}">DriveDash</a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <th:block th:replace="~{fragments/notifications :: notifications}"/>
            <span class="text-light" sec:authentication="name">User</span>
            <form th:action="@{/auth/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </nav>

    <!-- ── Sidebar ────────────────────────────────────────────────────── -->
    <nav id="sidebar" class="bg-dark">
        <div class="pt-3">
            <ul class="nav flex-column">

                <li class="nav-item">
                    <a class="nav-link text-white" th:href="@{/admin/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i> Dashboard
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN','EMPLOYEE')">
                    <a class="nav-link text-white" th:href="@{/admin/users}">
                        <i class="bi bi-people me-1"></i> Users
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN','EMPLOYEE')">
                    <a class="nav-link text-white" th:href="@{/admin/drivers}">
                        <i class="bi bi-person-badge me-1"></i> Drivers
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN')">
                    <a class="nav-link text-white" th:href="@{/admin/vehicles}">
                        <i class="bi bi-car-front me-1"></i> Vehicles
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN')">
                    <a class="nav-link text-white" th:href="@{/admin/zones}">
                        <i class="bi bi-map me-1"></i> Zones
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN','EMPLOYEE')">
                    <a class="nav-link text-white" th:href="@{/admin/trips}">
                        <i class="bi bi-geo-alt me-1"></i> Trips
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN','EMPLOYEE')">
                    <a class="nav-link text-white" th:href="@{/admin/parcels}">
                        <i class="bi bi-box-seam me-1"></i> Parcels
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN')">
                    <a class="nav-link text-white" th:href="@{/admin/fares}">
                        <i class="bi bi-currency-dollar me-1"></i> Fares
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN','EMPLOYEE')">
                    <a class="nav-link text-white" th:href="@{/admin/transactions}">
                        <i class="bi bi-credit-card me-1"></i> Transactions
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN')">
                    <a class="nav-link text-white" th:href="@{/admin/promotions}">
                        <i class="bi bi-gift me-1"></i> Promotions
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN','EMPLOYEE')">
                    <a class="nav-link text-white" th:href="@{/admin/reviews}">
                        <i class="bi bi-star me-1"></i> Reviews
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN','EMPLOYEE')">
                    <a class="nav-link text-white" th:href="@{/admin/chats}">
                        <i class="bi bi-chat me-1"></i> Chats
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('SUPER_ADMIN')">
                    <a class="nav-link text-white" th:href="@{/admin/gateways}">
                        <i class="bi bi-bank me-1"></i> Gateways
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('SUPER_ADMIN')">
                    <a class="nav-link text-white" th:href="@{/admin/settings}">
                        <i class="bi bi-gear me-1"></i> Settings
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN','ADMIN')">
                    <a class="nav-link text-white" th:href="@{/admin/log}">
                        <i class="bi bi-journal-text me-1"></i> Activity Log
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('SUPER_ADMIN')">
                    <a class="nav-link text-white" th:href="@{/admin/update}">
                        <i class="bi bi-arrow-up-circle me-1"></i> Software Update
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" th:href="@{/admin/profile}">
                        <i class="bi bi-person-circle me-1"></i> My Profile
                    </a>
                </li>

            </ul>
        </div>
    </nav>

</th:block>

</body>
</html>
