<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — DriveDash Admin'">DriveDash Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { padding-top: 56px; }
        #sidebar {
            position: fixed; top: 56px; bottom: 0; left: 0;
            width: 250px; z-index: 100; overflow-y: auto;
        }
        main { margin-left: 250px; }
        @media (max-width: 767.98px) { #sidebar { display: none !important; } main { margin-left: 0; } }
    </style>
</head>
<body>

<!-- ── Top navigation ─────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/admin/dashboard}">DriveDash</a>
    <div class="ms-auto d-flex align-items-center gap-3">

        <!-- Notification bell (data loaded by JS from /admin/get-notifications) -->
        <th:block th:replace="~{fragments/notifications :: notifications}"/>

        <span class="text-light" sec:authentication="name">User</span>

        <form th:action="@{/auth/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- ── Sidebar ──────────────────────────────────────────────────── -->
        <th:block th:replace="~{fragments/sidebar :: sidebar}"/>

        <!-- ── Main content ─────────────────────────────────────────────── -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4"
              th:replace="${content}">
            <!-- page body injected here -->
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="${extraScripts ?: ''}"/>
</body>
</html>
