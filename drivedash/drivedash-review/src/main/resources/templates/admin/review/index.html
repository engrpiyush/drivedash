<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Reviews')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Reviews &amp; Ratings</h2>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- User-specific summary (shown when filtering by user) -->
    <div th:if="${userId != null}" class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-warning bg-opacity-10 p-3">
                        <i class="bi bi-star-fill fs-4 text-warning"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Average Rating</div>
                        <div class="fs-5 fw-bold"
                             th:text="${#numbers.formatDecimal(avgRating, 1, 1) + ' / 5'}">0.0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                        <i class="bi bi-chat-square-text fs-4 text-primary"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Total Reviews Received</div>
                        <div class="fs-5 fw-bold" th:text="${totalReviews}">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/admin/reviews}" method="get" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Search Feedback</label>
                    <input type="text" name="search" class="form-control"
                           th:value="${search}" placeholder="Search review text..."/>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Trip Type</label>
                    <select name="tripType" class="form-select">
                        <option value="all" th:selected="${tripType == 'all'}">All Types</option>
                        <option value="ride_request" th:selected="${tripType == 'ride_request'}">Ride</option>
                        <option value="parcel" th:selected="${tripType == 'parcel'}">Parcel</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Rating</label>
                    <select name="rating" class="form-select">
                        <option value="" th:selected="${rating == null}">All Ratings</option>
                        <option value="5" th:selected="${rating == 5}">★★★★★ 5</option>
                        <option value="4" th:selected="${rating == 4}">★★★★☆ 4</option>
                        <option value="3" th:selected="${rating == 3}">★★★☆☆ 3</option>
                        <option value="2" th:selected="${rating == 2}">★★☆☆☆ 2</option>
                        <option value="1" th:selected="${rating == 1}">★☆☆☆☆ 1</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Filter</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">
                    Total: <strong class="text-primary" th:text="${reviews.totalElements}">0</strong>
                </span>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Trip Type</th>
                        <th>Given By</th>
                        <th>Received By</th>
                        <th>Rating</th>
                        <th>Feedback</th>
                        <th>Date</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r, iter : ${reviews.content}">
                        <td th:text="${reviews.number * reviews.size + iter.count}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${r.tripType == 'parcel'} ? 'bg-info text-dark' : 'bg-primary'"
                                  th:text="${r.tripType == 'parcel' ? 'Parcel' : 'Ride'}"></span>
                        </td>
                        <td>
                            <span th:if="${r.givenUser != null}"
                                  th:text="${r.givenUser.firstName + ' ' + (r.givenUser.lastName ?: '')}"></span>
                            <span th:unless="${r.givenUser != null}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span th:if="${r.receivedUser != null}"
                                  th:text="${r.receivedUser.firstName + ' ' + (r.receivedUser.lastName ?: '')}"></span>
                            <span th:unless="${r.receivedUser != null}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span th:each="s : ${#numbers.sequence(1, 5)}"
                                  th:text="${s <= r.rating ? '★' : '☆'}"
                                  th:style="${s <= r.rating ? 'color:#f5a623' : 'color:#ccc'}"></span>
                            <span class="ms-1 small text-muted" th:text="${r.rating + '/5'}"></span>
                        </td>
                        <td>
                            <span th:if="${r.feedback}" th:text="${r.feedback}"></span>
                            <span th:unless="${r.feedback}" class="text-muted fst-italic">No feedback</span>
                        </td>
                        <td th:text="${#temporals.format(r.createdAt, 'dd MMM yyyy')}"></td>
                        <td class="text-center">
                            <form th:action="@{'/admin/reviews/' + ${r.id} + '/delete'}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this review?')">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${reviews.content.isEmpty()}">
                        <td colspan="8" class="text-center text-muted py-4">No reviews found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${reviews.totalPages > 1}">
                <ul class="pagination justify-content-end mb-0">
                    <li class="page-item" th:classappend="${reviews.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/reviews(search=${search},rating=${rating},tripType=${tripType},page=${reviews.number - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, reviews.totalPages - 1)}"
                        th:classappend="${i == reviews.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/reviews(search=${search},rating=${rating},tripType=${tripType},page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${reviews.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/reviews(search=${search},rating=${rating},tripType=${tripType},page=${reviews.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
</body>
</html>
