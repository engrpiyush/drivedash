<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Edit Zone')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2>Edit Zone</h2>
        <a th:href="@{/admin/zones}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back to Zones
        </a>
    </div>

    <form id="zone_form" th:action="@{'/admin/zones/' + ${zone.id}}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="_method" value="PUT"/>

        <div class="card">
            <div class="card-body">
                <div class="row">
                    <!-- Instructions -->
                    <div class="col-lg-4 mb-4 mb-lg-0">
                        <h5 class="text-primary mb-3">Instructions</h5>
                        <p>Redraw the zone polygon on the map to change the zone boundaries.</p>
                        <p class="text-muted small">
                            If you don't redraw, the existing zone boundary will be kept.<br/>
                            Minimum 3 points required for a valid zone.
                        </p>
                    </div>

                    <!-- Map + Name -->
                    <div class="col-lg-8">
                        <div class="mb-3">
                            <label for="zone_name" class="form-label">Zone Name</label>
                            <input type="text" class="form-control" name="name" id="zone_name"
                                   th:value="${zone.name}" required/>
                        </div>

                        <!-- hidden coordinates -->
                        <div class="d-none">
                            <textarea name="coordinates" id="coordinates" rows="4" class="form-control" readonly></textarea>
                        </div>

                        <!-- Map -->
                        <div class="position-relative overflow-hidden rounded" style="height:400px;">
                            <input id="pac-input" type="text" placeholder="Search location..."
                                   class="form-control position-absolute"
                                   style="top:10px;left:50%;transform:translateX(-50%);width:300px;z-index:5;"/>
                            <div id="map-canvas" style="width:100%;height:100%;"></div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-3">
                    <button type="button" id="reset_btn" class="btn btn-outline-secondary">Reset</button>
                    <button type="submit" class="btn btn-primary">Update Zone</button>
                </div>
            </div>
        </div>
    </form>

</main>

<th:block th:if="${mapApiKey != null and !#strings.isEmpty(mapApiKey)}">
    <script th:src="@{'https://maps.googleapis.com/maps/api/js?key=' + ${mapApiKey} + '&libraries=drawing,places&v=3.50'}"></script>
</th:block>
<script th:inline="javascript">
    "use strict";

    // Injected by Thymeleaf
    const EXISTING_COORDS = /*[[${coordsList}]]*/ [];
    const CENTER_LAT      = /*[[${centerLat}]]*/ 23.757989;
    const CENTER_LNG      = /*[[${centerLng}]]*/ 90.360587;

    let map, drawingManager, lastPolygon = null, existingPolygon = null;
    const bounds = new google.maps.LatLngBounds();

    function autoGrow() {
        let el = document.getElementById("coordinates");
        if (el) { el.style.height = "5px"; el.style.height = (el.scrollHeight) + "px"; }
    }

    function addResetControl(mapObj) {
        const div = document.createElement("div");
        const btn = document.createElement("div");
        btn.style.cssText = "background:#fff;border:2px solid #fff;border-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer;margin:8px;padding:2px 6px;font-size:13px;";
        btn.innerHTML = "✕ Reset";
        div.appendChild(btn);
        btn.addEventListener("click", () => {
            if (lastPolygon) { lastPolygon.setMap(null); lastPolygon = null; }
            document.getElementById("coordinates").value = "";
        });
        mapObj.controls[google.maps.ControlPosition.TOP_RIGHT].push(div);
    }

    function initialize() {
        const center = { lat: CENTER_LAT, lng: CENTER_LNG };
        const opts = { zoom: 13, center: center, mapTypeId: google.maps.MapTypeId.ROADMAP };
        map = new google.maps.Map(document.getElementById("map-canvas"), opts);

        // Draw existing zone polygon
        if (EXISTING_COORDS && EXISTING_COORDS.length > 0) {
            existingPolygon = new google.maps.Polygon({
                paths: EXISTING_COORDS,
                strokeColor: "#050df2", strokeOpacity: 0.8, strokeWeight: 2,
                fillOpacity: 0
            });
            existingPolygon.setMap(map);
            existingPolygon.getPaths().forEach(path => {
                path.forEach(latlng => { bounds.extend(latlng); map.fitBounds(bounds); });
            });
        }

        drawingManager = new google.maps.drawing.DrawingManager({
            drawingMode: google.maps.drawing.OverlayType.POLYGON,
            drawingControl: true,
            drawingControlOptions: {
                position: google.maps.ControlPosition.TOP_CENTER,
                drawingModes: [google.maps.drawing.OverlayType.POLYGON]
            },
            polygonOptions: { editable: true }
        });
        drawingManager.setMap(map);

        google.maps.event.addListener(drawingManager, "overlaycomplete", function (event) {
            if (lastPolygon) { lastPolygon.setMap(null); }
            document.getElementById("coordinates").value = event.overlay.getPath().getArray().toString();
            lastPolygon = event.overlay;
            autoGrow();
        });

        addResetControl(map);

        const input = document.getElementById("pac-input");
        const searchBox = new google.maps.places.SearchBox(input);
        map.controls[google.maps.ControlPosition.TOP_CENTER].push(input);
        map.addListener("bounds_changed", () => searchBox.setBounds(map.getBounds()));

        let markers = [];
        searchBox.addListener("places_changed", () => {
            const places = searchBox.getPlaces();
            if (!places || places.length === 0) return;
            markers.forEach(m => m.setMap(null));
            markers = [];
            const b = new google.maps.LatLngBounds();
            places.forEach(place => {
                if (!place.geometry) return;
                markers.push(new google.maps.Marker({ map, title: place.name, position: place.geometry.location }));
                place.geometry.viewport ? b.union(place.geometry.viewport) : b.extend(place.geometry.location);
            });
            map.fitBounds(b);
        });
    }

    document.getElementById("reset_btn").addEventListener("click", function () {
        if (lastPolygon) { lastPolygon.setMap(null); lastPolygon = null; }
        document.getElementById("coordinates").value = "";
        document.getElementById("zone_name").value = "";
    });

    // Prevent Enter key from submitting while typing in search box
    document.getElementById("zone_form").addEventListener("keydown", function (e) {
        if (e.key === "Enter" && e.target.id === "pac-input") { e.preventDefault(); }
    });

    window.addEventListener("load", function () {
        if (typeof google !== "undefined") { initialize(); }
    });
</script>

</body>
</html>
