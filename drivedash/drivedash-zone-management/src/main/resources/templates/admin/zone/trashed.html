<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Deleted Zones')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2>Deleted Zone List</h2>
        <a th:href="@{/admin/zones}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back to Zones
        </a>
    </div>

    <div class="d-flex gap-2 mb-3">
        <span class="text-muted">Total Deleted:</span>
        <strong class="text-primary" th:text="${zones.totalElements}">0</strong>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Zone Name</th>
                        <th class="text-center">Trip Volume</th>
                        <th>Deleted At</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="zone, iter : ${zones.content}">
                        <td th:text="${zones.number * zones.size + iter.count}"></td>
                        <td th:text="${zone.name}"></td>
                        <td class="text-center"><span class="badge bg-secondary">Low</span></td>
                        <td th:text="${#temporals.format(zone.deletedAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{'/admin/zones/' + ${zone.id} + '/restore'}"
                                   class="btn btn-sm btn-outline-success"
                                   onclick="return confirm('Restore this zone?')"
                                   title="Restore">
                                    <i class="bi bi-arrow-repeat"></i> Restore
                                </a>
                                <form th:action="@{'/admin/zones/' + ${zone.id} + '/permanent'}" method="post"
                                      class="d-inline">
                                    <input type="hidden" name="_method" value="DELETE"/>
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Permanently delete this zone? This cannot be undone.')"
                                            title="Permanently delete">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${zones.content.isEmpty()}">
                        <td colspan="5" class="text-center text-muted py-4">No deleted zones found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <nav th:if="${zones.totalPages > 1}">
                <ul class="pagination justify-content-end mb-0">
                    <li class="page-item" th:classappend="${zones.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/zones/trashed(page=${zones.number - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, zones.totalPages - 1)}"
                        th:classappend="${i == zones.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/zones/trashed(page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${zones.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/zones/trashed(page=${zones.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>
</main>

</body>
</html>
