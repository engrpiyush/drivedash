<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Withdraw Requests')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <ul class="nav nav-tabs mb-4">
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/withdraw/methods}">Methods</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/admin/withdraw/requests}">Requests</a></li>
    </ul>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Withdraw Requests</h2>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Status filter -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item"><a class="nav-link" th:classappend="${status == 'pending'} ? 'active'"
                                th:href="@{/admin/withdraw/requests(status='pending')}">Pending</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${status == 'approved'} ? 'active'"
                                th:href="@{/admin/withdraw/requests(status='approved')}">Approved</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${status == 'rejected'} ? 'active'"
                                th:href="@{/admin/withdraw/requests(status='rejected')}">Rejected</a></li>
    </ul>

    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr><th>#</th><th>User ID</th><th>Amount</th><th>Method</th><th>Status</th><th>Date</th><th class="text-center">Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="r, iter : ${requests.content}">
                    <td th:text="${requests.number * requests.size + iter.count}"></td>
                    <td>
                        <small th:text="${r.userId}"></small>
                    </td>
                    <td th:text="${r.amount}"></td>
                    <td th:text="${r.method != null ? r.method.methodName : '—'}"></td>
                    <td>
                        <span th:if="${r.approved == null}" class="badge bg-warning text-dark">Pending</span>
                        <span th:if="${r.approved != null and r.approved}" class="badge bg-success">Approved</span>
                        <span th:if="${r.approved != null and !r.approved}" class="badge bg-danger">Rejected</span>
                    </td>
                    <td th:text="${#temporals.format(r.createdAt, 'dd MMM yyyy')}"></td>
                    <td class="text-center">
                        <a th:href="@{'/admin/withdraw/requests/' + ${r.id}}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-eye-fill"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${requests.content.isEmpty()}">
                    <td colspan="7" class="text-center text-muted py-4">No requests found.</td>
                </tr>
                </tbody>
            </table>

            <nav th:if="${requests.totalPages > 1}">
                <ul class="pagination justify-content-end mb-0">
                    <li class="page-item" th:classappend="${requests.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/withdraw/requests(status=${status},page=${requests.number - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, requests.totalPages - 1)}"
                        th:classappend="${i == requests.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/withdraw/requests(status=${status},page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${requests.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/withdraw/requests(status=${status},page=${requests.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
</body>
</html>
