<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Edit Driver')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between mb-4">
        <h2>Edit Driver</h2>
        <a th:href="@{/admin/drivers}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{'/admin/drivers/' + ${driver.id}}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="card mb-3">
            <div class="card-header"><h5 class="mb-0">Driver Information</h5></div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-sm-6">
                        <label class="form-label">First Name *</label>
                        <input type="text" name="firstName" class="form-control"
                               th:value="${req.firstName}" required/>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="lastName" class="form-control"
                               th:value="${req.lastName}"/>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">Phone *</label>
                        <input type="text" name="phone" class="form-control"
                               th:value="${req.phone}" required/>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control"
                               th:value="${req.email}"/>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">New Password</label>
                        <input type="password" name="password" class="form-control"
                               placeholder="Leave blank to keep current"/>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">Profile Image</label>
                        <input type="file" name="profileImageFile" class="form-control"
                               accept=".jpg,.jpeg,.png,.webp"/>
                        <div th:if="${driver.profileImage != null}" class="mt-1">
                            <img th:src="@{'/uploads/' + ${driver.profileImage}}"
                                 alt="profile" style="height:40px;" class="rounded"/>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">ID Type</label>
                        <select name="identificationType" class="form-select">
                            <option value="">Select</option>
                            <option value="NID" th:selected="${req.identificationType == 'NID'}">NID</option>
                            <option value="Passport" th:selected="${req.identificationType == 'Passport'}">Passport</option>
                            <option value="Driving License" th:selected="${req.identificationType == 'Driving License'}">Driving License</option>
                        </select>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">ID Number</label>
                        <input type="text" name="identificationNumber" class="form-control"
                               th:value="${req.identificationNumber}"/>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">Level</label>
                        <select name="userLevelId" class="form-select">
                            <option value="">No Level</option>
                            <option th:each="lvl : ${levels}" th:value="${lvl.id}" th:text="${lvl.name}"
                                    th:selected="${lvl.id == req.userLevelId}"></option>
                        </select>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">Status</label>
                        <div class="form-check form-switch mt-2">
                            <input class="form-check-input" type="checkbox" name="active" value="true"
                                   th:checked="${req.active}"/>
                            <label class="form-check-label">Active</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-primary">Update Driver</button>
        </div>
    </form>
</main>
</body>
</html>
