<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Edit Role')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between mb-4">
        <h2>Edit Role</h2>
        <a th:href="@{/admin/employees/roles}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{'/admin/employees/roles/' + ${role.id}}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="card mb-3">
            <div class="card-header"><h5 class="mb-0">Role Details</h5></div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Role Name *</label>
                    <input type="text" name="name" class="form-control" th:value="${req.name}" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Module Access</label>
                    <div class="row g-2">
                        <div class="col-sm-4 col-md-3" th:each="mod : ${allModules ?: #lists.emptyList()}">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="modules"
                                       th:value="${mod}" th:id="${'mod_' + mod}"
                                       th:checked="${req.modules != null and req.modules.contains(mod)}"/>
                                <label class="form-check-label text-capitalize" th:for="${'mod_' + mod}"
                                       th:text="${mod.replace('-', ' ')}"></label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="active" value="true"
                               th:checked="${req.active}"/>
                        <label class="form-check-label">Active</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-primary">Update Role</button>
        </div>
    </form>
</main>
</body>
</html>
