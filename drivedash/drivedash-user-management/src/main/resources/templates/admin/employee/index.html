<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layouts/admin :: head('Employees')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <ul class="nav nav-tabs mb-4">
        <li class="nav-item"><a class="nav-link active" th:href="@{/admin/employees}">Employees</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/employees/roles}">Roles</a></li>
    </ul>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Employees</h2>
        <div class="d-flex gap-2">
            <a sec:authorize="hasRole('SUPER_ADMIN')"
               th:href="@{/admin/employees/trashed}" class="btn btn-outline-warning btn-sm">
                <i class="bi bi-recycle"></i> Trashed
            </a>
            <a th:href="@{/admin/employees/create}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus"></i> Add Employee
            </a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Status filter -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item"><a class="nav-link" th:classappend="${status == 'all'} ? 'active'"
                                th:href="@{/admin/employees(status='all')}">All</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${status == 'active'} ? 'active'"
                                th:href="@{/admin/employees(status='active')}">Active</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${status == 'inactive'} ? 'active'"
                                th:href="@{/admin/employees(status='inactive')}">Inactive</a></li>
    </ul>

    <!-- Search -->
    <form th:action="@{/admin/employees}" method="get" class="d-flex gap-2 mb-3">
        <input type="hidden" name="status" th:value="${status}"/>
        <input type="text" name="search" class="form-control w-auto"
               th:value="${search}" placeholder="Search name / email..."/>
        <button class="btn btn-outline-primary">Search</button>
    </form>

    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th class="text-center">Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="e, iter : ${employees.content}">
                    <td th:text="${employees.number * employees.size + iter.count}"></td>
                    <td th:text="${e.firstName + ' ' + (e.lastName ?: '')}"></td>
                    <td th:text="${e.email}"></td>
                    <td>
                        <span th:each="r : ${e.roles}" class="badge bg-secondary me-1" th:text="${r.name}"></span>
                        <span th:if="${e.roles.isEmpty()}" class="text-muted">—</span>
                    </td>
                    <td>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" th:checked="${e.active}"
                                   th:data-href="@{/admin/employees/status(id=${e.id},status=${!e.active},currentStatus=${status})}"
                                   onclick="window.location=this.dataset.href"/>
                        </div>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/employees/' + ${e.id} + '/edit'}"
                               class="btn btn-sm btn-outline-info"><i class="bi bi-pencil-fill"></i></a>
                            <form th:action="@{'/admin/employees/' + ${e.id} + '/delete'}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this employee?')">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${employees.content.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">No employees found.</td>
                </tr>
                </tbody>
            </table>

            <nav th:if="${employees.totalPages > 1}">
                <ul class="pagination justify-content-end mb-0">
                    <li class="page-item" th:classappend="${employees.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/employees(status=${status},search=${search},page=${employees.number - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, employees.totalPages - 1)}"
                        th:classappend="${i == employees.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/employees(status=${status},search=${search},page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${employees.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/employees(status=${status},search=${search},page=${employees.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
</body>
</html>
