<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Notification Settings')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <h2 class="mb-3">Notification Settings</h2>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form th:action="@{/admin/business/configuration/notification/store}"
          method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="card">
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Event</th>
                            <th class="text-center">Push</th>
                            <th class="text-center">Email</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ns : ${notificationSettings}">
                            <td th:text="${ns.name}"></td>
                            <td class="text-center">
                                <input type="hidden"
                                       th:name="${'settings[' + nsStat.index + '].name'}"
                                       th:value="${ns.name}"/>
                                <input type="checkbox" class="form-check-input"
                                       th:name="${'settings[' + nsStat.index + '].push'}"
                                       th:checked="${ns.push}"/>
                            </td>
                            <td class="text-center">
                                <input type="checkbox" class="form-check-input"
                                       th:name="${'settings[' + nsStat.index + '].email'}"
                                       th:checked="${ns.email}"/>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <button type="submit" class="btn btn-primary mt-3">Save</button>
            </div>
        </div>
    </form>

</main>
</body>
</html>
