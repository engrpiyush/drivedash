<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Fare & Penalty Settings')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <h2 class="mb-3">Fare &amp; Penalty Settings</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <!-- ── Cancellation Reasons ────────────────────────────────────────────── -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between">
            <span>Cancellation Reasons</span>
            <button class="btn btn-sm btn-primary" data-bs-toggle="modal"
                    data-bs-target="#addReasonModal">+ Add Reason</button>
        </div>
        <div class="card-body">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>Type</th>
                        <th>User Type</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reason, iter : ${cancellationReasons}">
                        <td th:text="${iter.count}"></td>
                        <td th:text="${reason.title}"></td>
                        <td th:text="${reason.cancellationType}"></td>
                        <td th:text="${reason.userType}"></td>
                        <td>
                            <span th:class="${reason.active} ? 'badge bg-success' : 'badge bg-danger'"
                                  th:text="${reason.active} ? 'Active' : 'Inactive'"></span>
                        </td>
                        <td>
                            <a th:href="@{/admin/business/setup/trip-fare/cancellation-reason/edit/{id}(id=${reason.id})}"
                               class="btn btn-sm btn-warning">Edit</a>
                            <form th:action="@{/admin/business/setup/trip-fare/cancellation-reason/delete/{id}(id=${reason.id})}"
                                  method="post" class="d-inline">
                                <input type="hidden" name="_method" value="DELETE"/>
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Delete this reason?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(cancellationReasons)}">
                        <td colspan="6" class="text-center text-muted">No cancellation reasons found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<!-- ── Add Reason Modal ──────────────────────────────────────────────────────── -->
<div class="modal fade" id="addReasonModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/business/setup/trip-fare/cancellation-reason/store}"
                  method="post" th:object="${newReason}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-header">
                    <h5 class="modal-title">Add Cancellation Reason</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <textarea name="title" class="form-control" rows="3" required></textarea>
                        <div th:if="${#fields.hasErrors('title')}" class="text-danger"
                             th:errors="*{title}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cancellation Type</label>
                        <select name="cancellationType" class="form-select" required>
                            <option value="ONGOING_RIDE">Ongoing Ride</option>
                            <option value="ACCEPTED_RIDE">Accepted Ride</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">User Type</label>
                        <select name="userType" class="form-select" required>
                            <option value="DRIVER">Driver</option>
                            <option value="CUSTOMER">Customer</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
