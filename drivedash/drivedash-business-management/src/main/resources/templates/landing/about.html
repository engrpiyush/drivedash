<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/landing :: layout('About Us', ~{::body})}">
<body>

<!-- Page banner -->
<section class="py-5" style="background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); color: #fff;">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6">
                <h1 class="fw-bold mb-2">About Us</h1>
                <p class="lead mb-0 opacity-75"
                   th:if="${pageContent != null and pageContent['short_description'] != null}"
                   th:text="${pageContent['short_description']}">
                    Learn more about our story.
                </p>
            </div>
            <div class="col-lg-6 text-center mt-4 mt-lg-0"
                 th:if="${pageContent != null and pageContent['image'] != null}">
                <img th:src="@{${pageContent['image']}}"
                     class="img-fluid rounded-3 shadow"
                     alt="About Us"
                     style="max-height: 320px; object-fit: cover;">
            </div>
        </div>
    </div>
</section>

<!-- Long description -->
<section class="py-5 bg-white">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div th:if="${pageContent != null and pageContent['long_description'] != null}"
                     th:utext="${pageContent['long_description']}">
                    <p>No content available.</p>
                </div>
                <div th:if="${pageContent == null or pageContent['long_description'] == null}"
                     class="text-muted text-center py-5">
                    <i class="bi bi-file-earmark-text display-4 d-block mb-3 opacity-50"></i>
                    Content coming soon.
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
