<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Edit Parcel Weight')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Edit Weight Range</h2>
        <a th:href="@{/admin/parcel/weights}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="text-primary text-uppercase mb-4">Update Weight Range</h5>
            <form th:action="@{'/admin/parcel/weights/' + ${weight.id}}" method="post"
                  th:object="${req}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Min Weight (kg)</label>
                        <input type="number" step="0.01" min="0" class="form-control"
                               name="minWeight" th:value="${weight.minWeight}" required
                               placeholder="e.g. 0.5"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('minWeight')}"
                             th:errors="*{minWeight}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Max Weight (kg)</label>
                        <input type="number" step="0.01" min="0" class="form-control"
                               name="maxWeight" th:value="${weight.maxWeight}" required
                               placeholder="e.g. 5.0"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('maxWeight')}"
                             th:errors="*{maxWeight}"></div>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-4 gap-2">
                    <a th:href="@{/admin/parcel/weights}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Update</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
