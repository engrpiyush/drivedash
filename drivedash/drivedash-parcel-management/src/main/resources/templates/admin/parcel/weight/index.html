<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layouts/admin :: head('Parcel Weights')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Parcel Weights</h2>
        <a sec:authorize="hasRole('SUPER_ADMIN')"
           th:href="@{/admin/parcel/weights/trashed}" class="btn btn-outline-warning btn-sm">
            <i class="bi bi-recycle"></i> Trashed
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Inline create form -->
    <form th:action="@{/admin/parcel/weights}" method="post" th:object="${req}" class="card mb-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="card-body">
            <h5 class="text-primary text-uppercase mb-4">Add New Weight Range</h5>
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label">Min Weight (kg)</label>
                    <input type="number" step="0.01" min="0" class="form-control"
                           th:field="*{minWeight}" required placeholder="e.g. 0.5"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('minWeight')}"
                         th:errors="*{minWeight}"></div>
                </div>
                <div class="col-md-5">
                    <label class="form-label">Max Weight (kg)</label>
                    <input type="number" step="0.01" min="0" class="form-control"
                           th:field="*{maxWeight}" required placeholder="e.g. 5.0"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('maxWeight')}"
                         th:errors="*{maxWeight}"></div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Submit</button>
                </div>
            </div>
        </div>
    </form>

    <!-- List -->
    <h4 class="mb-3">Weight Range List</h4>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${status == 'all'} ? 'active'"
               th:href="@{/admin/parcel/weights(status='all')}">All</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${status == 'active'} ? 'active'"
               th:href="@{/admin/parcel/weights(status='active')}">Active</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${status == 'inactive'} ? 'active'"
               th:href="@{/admin/parcel/weights(status='inactive')}">Inactive</a>
        </li>
    </ul>

    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">
                    Total: <strong class="text-primary" th:text="${weights.totalElements}">0</strong>
                </span>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Min Weight (kg)</th>
                        <th>Max Weight (kg)</th>
                        <th>Status</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="w, iter : ${weights.content}">
                        <td th:text="${weights.number * weights.size + iter.count}"></td>
                        <td th:text="${w.minWeight}"></td>
                        <td th:text="${w.maxWeight}"></td>
                        <td>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox"
                                       th:checked="${w.active}"
                                       th:data-href="@{/admin/parcel/weights/status(id=${w.id},active=${!w.active},status=${status})}"
                                       onclick="window.location=this.dataset.href"/>
                            </div>
                        </td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{'/admin/parcel/weights/' + ${w.id} + '/edit'}"
                                   class="btn btn-sm btn-outline-info">
                                    <i class="bi bi-pencil-fill"></i>
                                </a>
                                <form th:action="@{'/admin/parcel/weights/' + ${w.id} + '/delete'}"
                                      method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Delete this weight range?')">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${weights.content.isEmpty()}">
                        <td colspan="5" class="text-center text-muted py-4">No weight ranges found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${weights.totalPages > 1}">
                <ul class="pagination justify-content-end mb-0">
                    <li class="page-item" th:classappend="${weights.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/parcel/weights(status=${status},page=${weights.number - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, weights.totalPages - 1)}"
                        th:classappend="${i == weights.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/parcel/weights(status=${status},page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${weights.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/parcel/weights(status=${status},page=${weights.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
</body>
</html>
