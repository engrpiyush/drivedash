<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Edit Parcel Category')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Edit Parcel Category</h2>
        <a th:href="@{/admin/parcel/categories}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="text-primary text-uppercase mb-4">Update Category</h5>
            <form th:action="@{'/admin/parcel/categories/' + ${category.id}}" method="post"
                  enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label">Category Name</label>
                        <input type="text" class="form-control" name="name"
                               th:value="${category.name}" required placeholder="e.g. Electronics"/>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Short Description</label>
                        <input type="text" class="form-control" name="description"
                               th:value="${category.description}" required placeholder="Brief description"/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Category Icon (PNG)</label>
                        <input type="file" class="form-control" name="imageFile" accept=".png"/>
                        <div class="mt-2" th:if="${category.image}">
                            <img th:src="@{'/uploads/' + ${category.image}}" alt="Current Icon"
                                 style="height:48px;width:48px;object-fit:cover;" class="rounded border"/>
                            <div class="form-text">Leave blank to keep current icon</div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-4 gap-2">
                    <a th:href="@{/admin/parcel/categories}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Update</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
