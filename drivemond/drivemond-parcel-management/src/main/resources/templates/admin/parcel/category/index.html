<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layouts/admin :: head('Parcel Categories')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Parcel Categories</h2>
        <a sec:authorize="hasRole('SUPER_ADMIN')"
           th:href="@{/admin/parcel/categories/trashed}" class="btn btn-outline-warning btn-sm">
            <i class="bi bi-recycle"></i> Trashed
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Inline create form -->
    <form th:action="@{/admin/parcel/categories}" method="post"
          enctype="multipart/form-data" class="card mb-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="card-body">
            <h5 class="text-primary text-uppercase mb-4">Add New Parcel Category</h5>
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label">Category Name</label>
                    <input type="text" class="form-control" name="name" required placeholder="e.g. Electronics"/>
                </div>
                <div class="col-md-5">
                    <label class="form-label">Short Description</label>
                    <input type="text" class="form-control" name="description" required placeholder="Brief description"/>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Category Icon (PNG)</label>
                    <input type="file" class="form-control" name="imageFile" accept=".png" required/>
                </div>
            </div>
            <div class="d-flex justify-content-end mt-3">
                <button type="submit" class="btn btn-primary">Submit</button>
            </div>
        </div>
    </form>

    <!-- List -->
    <h4 class="mb-3">Parcel Category List</h4>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${status == 'all'} ? 'active'"
               th:href="@{/admin/parcel/categories(status='all')}">All</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${status == 'active'} ? 'active'"
               th:href="@{/admin/parcel/categories(status='active')}">Active</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${status == 'inactive'} ? 'active'"
               th:href="@{/admin/parcel/categories(status='inactive')}">Inactive</a>
        </li>
    </ul>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/parcel/categories}" method="get" class="d-flex gap-2 mb-3">
                <input type="hidden" name="status" th:value="${status}"/>
                <input type="text" class="form-control" name="search" th:value="${search}"
                       placeholder="Search by category name..."/>
                <button type="submit" class="btn btn-outline-primary">Search</button>
            </form>

            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">
                    Total: <strong class="text-primary" th:text="${categories.totalElements}">0</strong>
                </span>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Icon</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cat, iter : ${categories.content}">
                        <td th:text="${categories.number * categories.size + iter.count}"></td>
                        <td>
                            <img th:src="@{'/uploads/' + ${cat.image}}" alt="icon"
                                 style="height:40px;width:40px;object-fit:cover;" class="rounded"/>
                        </td>
                        <td th:text="${cat.name}"></td>
                        <td th:text="${cat.description}"></td>
                        <td>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox"
                                       th:checked="${cat.active}"
                                       th:data-href="@{/admin/parcel/categories/status(id=${cat.id},active=${!cat.active},status=${status})}"
                                       onclick="window.location=this.dataset.href"/>
                            </div>
                        </td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{'/admin/parcel/categories/' + ${cat.id} + '/edit'}"
                                   class="btn btn-sm btn-outline-info">
                                    <i class="bi bi-pencil-fill"></i>
                                </a>
                                <form th:action="@{'/admin/parcel/categories/' + ${cat.id} + '/delete'}"
                                      method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Delete this category?')">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${categories.content.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-4">No categories found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${categories.totalPages > 1}">
                <ul class="pagination justify-content-end mb-0">
                    <li class="page-item" th:classappend="${categories.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/parcel/categories(status=${status},search=${search},page=${categories.number - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, categories.totalPages - 1)}"
                        th:classappend="${i == categories.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/parcel/categories(status=${status},search=${search},page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${categories.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/parcel/categories(status=${status},search=${search},page=${categories.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
</body>
</html>
