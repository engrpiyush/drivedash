<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layouts/admin :: head('Drivers')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Drivers</h2>
        <div class="d-flex gap-2">
            <a sec:authorize="hasRole('SUPER_ADMIN')"
               th:href="@{/admin/drivers/trashed}" class="btn btn-outline-warning btn-sm">
                <i class="bi bi-recycle"></i> Trashed
            </a>
            <a th:href="@{/admin/drivers/create}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus"></i> Add Driver
            </a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Status filter -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item"><a class="nav-link" th:classappend="${status == 'all'} ? 'active'"
                                th:href="@{/admin/drivers(status='all')}">All</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${status == 'active'} ? 'active'"
                                th:href="@{/admin/drivers(status='active')}">Active</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${status == 'inactive'} ? 'active'"
                                th:href="@{/admin/drivers(status='inactive')}">Inactive / Pending</a></li>
    </ul>

    <!-- Search -->
    <form th:action="@{/admin/drivers}" method="get" class="d-flex gap-2 mb-3">
        <input type="hidden" name="status" th:value="${status}"/>
        <input type="text" name="search" class="form-control w-auto"
               th:value="${search}" placeholder="Search name / phone..."/>
        <button class="btn btn-outline-primary">Search</button>
    </form>

    <div class="card">
        <div class="card-body table-responsive">
            <div class="mb-2 text-muted">Total: <strong class="text-primary"
                    th:text="${drivers.totalElements}">0</strong></div>
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>ID Type</th>
                    <th>Status</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d, iter : ${drivers.content}">
                    <td th:text="${drivers.number * drivers.size + iter.count}"></td>
                    <td>
                        <div th:text="${d.firstName + ' ' + (d.lastName ?: '')}"></div>
                        <small class="text-muted" th:text="${d.email}"></small>
                    </td>
                    <td th:text="${d.phone}"></td>
                    <td th:text="${d.identificationType ?: '—'}"></td>
                    <td>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" th:checked="${d.active}"
                                   th:data-href="@{/admin/drivers/status(id=${d.id},status=${!d.active},currentStatus=${status})}"
                   onclick="window.location=this.dataset.href"/>
                        </div>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/drivers/' + ${d.id} + '/edit'}"
                               class="btn btn-sm btn-outline-info"><i class="bi bi-pencil-fill"></i></a>
                            <form th:if="${!d.active}"
                                  th:action="@{'/admin/drivers/' + ${d.id} + '/approve'}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-success"
                                        onclick="return confirm('Approve this driver?')">
                                    <i class="bi bi-check-circle-fill"></i>
                                </button>
                            </form>
                            <form th:action="@{'/admin/drivers/' + ${d.id} + '/delete'}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this driver?')">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${drivers.content.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">No drivers found.</td>
                </tr>
                </tbody>
            </table>

            <nav th:if="${drivers.totalPages > 1}">
                <ul class="pagination justify-content-end mb-0">
                    <li class="page-item" th:classappend="${drivers.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/drivers(status=${status},search=${search},page=${drivers.number - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, drivers.totalPages - 1)}"
                        th:classappend="${i == drivers.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/drivers(status=${status},search=${search},page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${drivers.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/drivers(status=${status},search=${search},page=${drivers.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
</body>
</html>
