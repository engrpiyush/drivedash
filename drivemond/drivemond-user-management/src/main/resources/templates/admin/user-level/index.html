<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layouts/admin :: head('User Levels')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>User Levels</h2>
        <div class="d-flex gap-2">
            <a sec:authorize="hasRole('SUPER_ADMIN')"
               th:href="@{/admin/user-levels/trashed}" class="btn btn-outline-warning btn-sm">
                <i class="bi bi-recycle"></i> Trashed
            </a>
            <a th:href="@{/admin/user-levels/create(userType=${userType})}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus"></i> Add Level
            </a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- User type filter -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item"><a class="nav-link" th:classappend="${userType == 'all'} ? 'active'"
                                th:href="@{/admin/user-levels(userType='all')}">All</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${userType == 'customer'} ? 'active'"
                                th:href="@{/admin/user-levels(userType='customer')}">Customer</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${userType == 'driver'} ? 'active'"
                                th:href="@{/admin/user-levels(userType='driver')}">Driver</a></li>
    </ul>

    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Seq</th>
                    <th>Reward</th>
                    <th>Target Rides</th>
                    <th>Status</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="lvl, iter : ${levels.content}">
                    <td th:text="${levels.number * levels.size + iter.count}"></td>
                    <td>
                        <div th:text="${lvl.name}"></div>
                        <div th:if="${lvl.image != null}">
                            <img th:src="@{'/uploads/' + ${lvl.image}}" alt="level" style="height:28px;" class="mt-1"/>
                        </div>
                    </td>
                    <td><span class="badge" th:classappend="${lvl.userType == 'customer'} ? 'bg-info' : 'bg-warning text-dark'"
                              th:text="${lvl.userType}"></span></td>
                    <td th:text="${lvl.sequence}"></td>
                    <td>
                        <span th:text="${lvl.rewardType}"></span>
                        <span th:if="${lvl.rewardAmount != null}" class="text-muted ms-1"
                              th:text="${lvl.rewardAmount}"></span>
                    </td>
                    <td th:text="${lvl.targetedRide}"></td>
                    <td>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" th:checked="${lvl.active}"
                                   th:data-href="@{/admin/user-levels/status(id=${lvl.id},status=${!lvl.active},userType=${userType})}"
                                   onclick="window.location=this.dataset.href"/>
                        </div>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/user-levels/' + ${lvl.id} + '/edit'}"
                               class="btn btn-sm btn-outline-info"><i class="bi bi-pencil-fill"></i></a>
                            <form th:action="@{'/admin/user-levels/' + ${lvl.id} + '/delete'}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this level?')">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${levels.content.isEmpty()}">
                    <td colspan="8" class="text-center text-muted py-4">No levels found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
