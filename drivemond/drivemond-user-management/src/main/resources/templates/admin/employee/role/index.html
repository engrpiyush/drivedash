<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Roles')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <ul class="nav nav-tabs mb-4">
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/employees}">Employees</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/admin/employees/roles}">Roles</a></li>
    </ul>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Employee Roles</h2>
        <a th:href="@{/admin/employees/roles/create}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus"></i> Add Role
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr><th>#</th><th>Name</th><th>Modules</th><th>Status</th><th class="text-center">Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="r, iter : ${roles.content}">
                    <td th:text="${roles.number * roles.size + iter.count}"></td>
                    <td th:text="${r.name}"></td>
                    <td>
                        <span th:each="m : ${r.modules}" class="badge bg-light text-dark border me-1" th:text="${m}"></span>
                        <span th:if="${r.modules == null or r.modules.isEmpty()}" class="text-muted">All</span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/employees/roles/' + ${r.id} + '/status'}?status=${!r.active}">
                            <span th:if="${r.active}" class="badge bg-success">Active</span>
                            <span th:unless="${r.active}" class="badge bg-secondary">Inactive</span>
                        </a>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/employees/roles/' + ${r.id} + '/edit'}"
                               class="btn btn-sm btn-outline-info"><i class="bi bi-pencil-fill"></i></a>
                            <form th:action="@{'/admin/employees/roles/' + ${r.id} + '/delete'}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this role?')">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${roles.content.isEmpty()}">
                    <td colspan="5" class="text-center text-muted py-4">No roles found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
