<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Withdraw Methods')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <ul class="nav nav-tabs mb-4">
        <li class="nav-item"><a class="nav-link active" th:href="@{/admin/withdraw/methods}">Methods</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/withdraw/requests}">Requests</a></li>
    </ul>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Withdraw Methods</h2>
        <a th:href="@{/admin/withdraw/methods/create}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus"></i> Add Method
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr><th>#</th><th>Name</th><th>Default</th><th>Status</th><th class="text-center">Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="m, iter : ${methods}">
                    <td th:text="${iter.count}"></td>
                    <td th:text="${m.methodName}"></td>
                    <td>
                        <span th:if="${m.default}" class="badge bg-primary">Default</span>
                        <span th:unless="${m.default}" class="text-muted">—</span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/withdraw/methods/' + ${m.id} + '/status'}?status=${!m.active}">
                            <span th:if="${m.active}" class="badge bg-success">Active</span>
                            <span th:unless="${m.active}" class="badge bg-secondary">Inactive</span>
                        </a>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/withdraw/methods/' + ${m.id} + '/edit'}"
                               class="btn btn-sm btn-outline-info"><i class="bi bi-pencil-fill"></i></a>
                            <form th:action="@{'/admin/withdraw/methods/' + ${m.id} + '/delete'}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this method?')">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${methods.isEmpty()}">
                    <td colspan="5" class="text-center text-muted py-4">No methods found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
