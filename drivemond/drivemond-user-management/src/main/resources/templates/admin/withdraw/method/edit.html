<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Edit Withdraw Method')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between mb-4">
        <h2>Edit Withdraw Method</h2>
        <a th:href="@{/admin/withdraw/methods}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{'/admin/withdraw/methods/' + ${method.id}}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="card mb-3">
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Method Name *</label>
                    <input type="text" name="methodName" class="form-control"
                           th:value="${req.methodName}" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Fields JSON</label>
                    <textarea name="methodFieldsJson" class="form-control font-monospace" rows="6"
                              th:text="${method.methodFields != null ? #strings.toString(method.methodFields) : ''}"></textarea>
                    <small class="text-muted">JSON array of field definitions</small>
                </div>
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="default" value="true"
                               th:checked="${req.default}"/>
                        <label class="form-check-label">Set as Default</label>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="active" value="true"
                               th:checked="${req.active}"/>
                        <label class="form-check-label">Active</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-primary">Update Method</button>
        </div>
    </form>
</main>
</body>
</html>
