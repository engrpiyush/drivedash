<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Customer Wallet')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Customer Wallet</h2>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Add Fund Form -->
    <form th:action="@{/admin/transactions/wallet}" method="post"
          th:object="${req}" class="card mb-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="card-body">
            <h5 class="text-primary text-uppercase mb-4">Add Fund to Customer Wallet</h5>
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label">Customer</label>
                    <select name="customerId" class="form-select" required>
                        <option value="">— Select Customer —</option>
                        <option th:each="c : ${customers}"
                                th:value="${c.id}"
                                th:text="${c.firstName + ' ' + (c.lastName ?: '') + ' (' + (c.phone ?: c.email) + ')'}">
                        </option>
                    </select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('customerId')}"
                         th:errors="*{customerId}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Amount</label>
                    <input type="number" step="0.01" min="0.01" class="form-control"
                           th:field="*{amount}" required placeholder="0.00"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('amount')}"
                         th:errors="*{amount}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Note (optional)</label>
                    <input type="text" class="form-control" th:field="*{note}"
                           placeholder="e.g. Promotional credit"/>
                </div>
            </div>
            <div class="d-flex justify-content-end mt-3">
                <button type="submit" class="btn btn-primary">Add Fund</button>
            </div>
        </div>
    </form>

    <!-- Wallet Transaction History -->
    <h4 class="mb-3">Wallet Transaction History</h4>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/transactions/wallet}" method="get"
                  class="d-flex gap-2 mb-3">
                <input type="text" name="search" class="form-control"
                       th:value="${search}" placeholder="Search by transaction type..."/>
                <button type="submit" class="btn btn-outline-primary">Search</button>
            </form>

            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">
                    Total: <strong class="text-primary" th:text="${transactions.totalElements}">0</strong>
                </span>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Ref ID</th>
                        <th>Date</th>
                        <th>Customer</th>
                        <th>Type</th>
                        <th class="text-end">Credit</th>
                        <th class="text-end">Debit</th>
                        <th class="text-end">Balance</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="txn, iter : ${transactions.content}">
                        <td th:text="${transactions.number * transactions.size + iter.count}"></td>
                        <td><code class="small" th:text="${txn.id}"></code></td>
                        <td th:text="${#temporals.format(txn.createdAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td>
                            <span th:if="${txn.user != null}">
                                <span th:text="${txn.user.firstName + ' ' + (txn.user.lastName ?: '')}"></span>
                                <div class="text-muted small" th:text="${txn.user.phone ?: txn.user.email}"></div>
                            </span>
                            <span th:unless="${txn.user != null}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span class="badge bg-info text-dark text-capitalize"
                                  th:text="${txn.attribute != null ? txn.attribute.replace('_', ' ') : '—'}"></span>
                        </td>
                        <td class="text-end text-success fw-semibold"
                            th:text="${txn.credit.compareTo(java.math.BigDecimal.ZERO) > 0 ? '+' + #numbers.formatDecimal(txn.credit, 1, 2) : '—'}"></td>
                        <td class="text-end text-danger fw-semibold"
                            th:text="${txn.debit.compareTo(java.math.BigDecimal.ZERO) > 0 ? '-' + #numbers.formatDecimal(txn.debit, 1, 2) : '—'}"></td>
                        <td class="text-end fw-semibold"
                            th:text="${#numbers.formatDecimal(txn.balance, 1, 2)}"></td>
                    </tr>
                    <tr th:if="${transactions.content.isEmpty()}">
                        <td colspan="8" class="text-center text-muted py-4">No wallet transactions found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${transactions.totalPages > 1}">
                <ul class="pagination justify-content-end mb-0">
                    <li class="page-item" th:classappend="${transactions.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/transactions/wallet(search=${search},page=${transactions.number - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, transactions.totalPages - 1)}"
                        th:classappend="${i == transactions.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/transactions/wallet(search=${search},page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${transactions.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/transactions/wallet(search=${search},page=${transactions.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
</body>
</html>
