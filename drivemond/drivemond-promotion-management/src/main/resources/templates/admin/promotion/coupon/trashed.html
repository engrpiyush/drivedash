<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Trashed Coupons')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Trashed Coupons</h2>
        <a th:href="@{/admin/promotion/coupons}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Code</th>
                        <th>Type</th>
                        <th>Discount</th>
                        <th>Deleted At</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c, iter : ${coupons}">
                        <td th:text="${iter.count}"></td>
                        <td th:text="${c.name}"></td>
                        <td><code th:text="${c.couponCode}"></code></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${c.couponType == 'first_order'} ? 'bg-warning text-dark' : 'bg-secondary'"
                                  th:text="${c.couponType == 'first_order' ? 'First Order' : 'Default'}"></span>
                        </td>
                        <td>
                            <span th:if="${c.amountType == 'percentage'}"
                                  th:text="${c.coupon + '%'}"></span>
                            <span th:unless="${c.amountType == 'percentage'}"
                                  th:text="${#numbers.formatDecimal(c.coupon, 1, 2)}"></span>
                        </td>
                        <td th:text="${#temporals.format(c.deletedAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{'/admin/promotion/coupons/' + ${c.id} + '/restore'}"
                                   class="btn btn-sm btn-outline-success">
                                    <i class="bi bi-arrow-counterclockwise"></i> Restore
                                </a>
                                <form th:action="@{'/admin/promotion/coupons/' + ${c.id} + '/permanent'}"
                                      method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            onclick="return confirm('Permanently delete? This cannot be undone.')">
                                        <i class="bi bi-trash-fill"></i> Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${coupons.isEmpty()}">
                        <td colspan="7" class="text-center text-muted py-4">No trashed coupons.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
