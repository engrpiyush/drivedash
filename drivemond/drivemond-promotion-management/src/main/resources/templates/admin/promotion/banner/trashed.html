<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Trashed Banners')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Trashed Banners</h2>
        <a th:href="@{/admin/promotion/banners}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Group</th>
                        <th>Deleted At</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="b, iter : ${banners}">
                        <td th:text="${iter.count}"></td>
                        <td>
                            <img th:src="@{'/uploads/' + ${b.image}}" alt="banner"
                                 style="height:40px;width:70px;object-fit:cover;" class="rounded"
                                 th:if="${b.image}"/>
                        </td>
                        <td th:text="${b.name}"></td>
                        <td th:text="${b.bannerGroup ?: '—'}"></td>
                        <td th:text="${#temporals.format(b.deletedAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{'/admin/promotion/banners/' + ${b.id} + '/restore'}"
                                   class="btn btn-sm btn-outline-success">
                                    <i class="bi bi-arrow-counterclockwise"></i> Restore
                                </a>
                                <form th:action="@{'/admin/promotion/banners/' + ${b.id} + '/permanent'}"
                                      method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            onclick="return confirm('Permanently delete? This cannot be undone.')">
                                        <i class="bi bi-trash-fill"></i> Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${banners.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-4">No trashed banners.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
