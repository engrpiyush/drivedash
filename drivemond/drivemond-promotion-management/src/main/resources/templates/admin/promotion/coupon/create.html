<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Add Coupon')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Add New Coupon</h2>
        <a th:href="@{/admin/promotion/coupons}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <form th:action="@{/admin/promotion/coupons}" method="post" th:object="${req}" class="card">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="card-body">
            <h5 class="text-primary text-uppercase mb-4">Coupon Details</h5>
            <div class="row g-3">

                <!-- Basic Info -->
                <div class="col-md-4">
                    <label class="form-label">Coupon Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{name}" required maxlength="50"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Coupon Code <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{couponCode}" required maxlength="30"
                           placeholder="e.g. SAVE20"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('couponCode')}" th:errors="*{couponCode}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Description <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{description}" required maxlength="255"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <!-- Applicability -->
                <div class="col-md-4">
                    <label class="form-label">Coupon Type <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{couponType}" onchange="toggleCouponType(this.value)">
                        <option value="default">Default</option>
                        <option value="first_order">First Order</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Amount Type <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{amountType}" onchange="toggleAmountType(this.value)">
                        <option value="percentage">Percentage (%)</option>
                        <option value="amount">Fixed Amount</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Usage Limit (per user) <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" th:field="*{limit}" required min="1"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('limit')}" th:errors="*{limit}"></div>
                </div>

                <!-- Amounts -->
                <div class="col-md-3">
                    <label class="form-label">Discount Value <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" class="form-control" th:field="*{coupon}" required min="0.01"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('coupon')}" th:errors="*{coupon}"></div>
                </div>
                <div class="col-md-3" id="maxCouponCol">
                    <label class="form-label">Max Discount Amount</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{maxCouponAmount}" min="0.01"
                           placeholder="Cap for percentage discount"/>
                </div>
                <div class="col-md-3" id="minTripCol">
                    <label class="form-label">Minimum Trip Amount <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" class="form-control" th:field="*{minTripAmount}" min="0.01"
                           id="minTripAmount"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('minTripAmount')}" th:errors="*{minTripAmount}"></div>
                </div>

                <!-- Dates -->
                <div class="col-md-3">
                    <label class="form-label">Start Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" th:field="*{startDate}" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">End Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" th:field="*{endDate}" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
                </div>

                <!-- User targeting -->
                <div class="col-md-3">
                    <label class="form-label">User Level (optional)</label>
                    <select class="form-select" th:field="*{userLevelId}">
                        <option value="">— All Levels —</option>
                        <option th:each="level : ${userLevels}" th:value="${level.id}"
                                th:text="${level.name}"></option>
                    </select>
                </div>

                <!-- Rules -->
                <div class="col-md-4">
                    <label class="form-label">Coupon Rules <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{rules}" onchange="toggleRules(this.value)">
                        <option value="default">Default (All)</option>
                        <option value="vehicle_category_wise">Vehicle Category Wise</option>
                    </select>
                </div>

                <!-- Vehicle category multiselect (shown when rules = vehicle_category_wise) -->
                <div class="col-md-8" id="categorySection" style="display:none;">
                    <label class="form-label">Vehicle Categories <span class="text-danger">*</span></label>
                    <select class="form-select" id="vehicleCategorySelect" multiple size="4"
                            name="vehicleCategoryIds">
                        <!-- Populated via JS fetch -->
                    </select>
                    <div class="form-text">Hold Ctrl/Cmd to select multiple categories</div>
                </div>
            </div>

            <div class="d-flex justify-content-end mt-4 gap-2">
                <a th:href="@{/admin/promotion/coupons}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Coupon</button>
            </div>
        </div>
    </form>
</main>
<script>
    function toggleAmountType(type) {
        const maxCol = document.getElementById('maxCouponCol');
        maxCol.style.display = type === 'percentage' ? '' : 'none';
    }

    function toggleCouponType(type) {
        const minTripCol = document.getElementById('minTripCol');
        const minTripInput = document.getElementById('minTripAmount');
        const isFirstOrder = type === 'first_order';
        minTripCol.style.display = isFirstOrder ? 'none' : '';
        minTripInput.required = !isFirstOrder;
    }

    function toggleRules(rules) {
        const catSection = document.getElementById('categorySection');
        catSection.style.display = rules === 'vehicle_category_wise' ? '' : 'none';
        if (rules === 'vehicle_category_wise' && !document.getElementById('vehicleCategorySelect').options.length) {
            loadCategories();
        }
    }

    function loadCategories() {
        fetch('/api/v1/vehicle/categories')
            .then(r => r.json())
            .then(data => {
                const select = document.getElementById('vehicleCategorySelect');
                data.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.id;
                    opt.textContent = cat.name;
                    select.appendChild(opt);
                });
            });
    }

    // Init state
    toggleAmountType('percentage');
</script>
</body>
</html>
