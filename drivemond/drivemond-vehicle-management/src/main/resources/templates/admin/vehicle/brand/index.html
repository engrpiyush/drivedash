<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layouts/admin :: head('Vehicle Brands')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <!-- Attribute setup tab nav -->
    <ul class="nav nav-tabs mb-4">
        <li class="nav-item">
            <a class="nav-link active" th:href="@{/admin/vehicle/attribute-setup/brand}">Brands</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/vehicle/attribute-setup/category}">Categories</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/vehicle/attribute-setup/model}">Models</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/vehicles}">Vehicles</a>
        </li>
    </ul>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Add Brand Form -->
    <div class="card mb-4">
        <div class="card-header"><h5 class="mb-0">Add New Brand</h5></div>
        <div class="card-body">
            <form th:action="@{/admin/vehicle/attribute-setup/brand}" method="post"
                  enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Brand Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Toyota" required/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Description <span class="text-danger">*</span></label>
                        <input type="text" name="description" class="form-control" required/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Brand Image (PNG)</label>
                        <input type="file" name="image" class="form-control" accept="image/png"/>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Add Brand</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Brand List -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h5>Brand List</h5>
        <div class="d-flex gap-2">
            <a sec:authorize="hasRole('SUPER_ADMIN')"
               th:href="@{/admin/vehicle/attribute-setup/brand/trashed}"
               class="btn btn-sm btn-outline-warning"><i class="bi bi-recycle"></i> Trashed</a>
        </div>
    </div>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${status == 'all'} ? 'active'"
               th:href="@{/admin/vehicle/attribute-setup/brand(status='all')}">All</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${status == 'active'} ? 'active'"
               th:href="@{/admin/vehicle/attribute-setup/brand(status='active')}">Active</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${status == 'inactive'} ? 'active'"
               th:href="@{/admin/vehicle/attribute-setup/brand(status='inactive')}">Inactive</a>
        </li>
    </ul>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/vehicle/attribute-setup/brand}" method="get" class="d-flex gap-2 mb-3">
                <input type="hidden" name="status" th:value="${status}"/>
                <input type="text" name="search" class="form-control w-auto" th:value="${search}"
                       placeholder="Search brand..."/>
                <button class="btn btn-outline-primary">Search</button>
            </form>

            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Image</th>
                        <th>Brand Name</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="brand, iter : ${brands.content}">
                        <td th:text="${brands.number * brands.size + iter.count}"></td>
                        <td>
                            <img th:if="${brand.image != null}"
                                 th:src="@{'/uploads/' + ${brand.image}}"
                                 alt="brand" style="height:40px;width:40px;object-fit:cover;" class="rounded"/>
                            <span th:unless="${brand.image != null}" class="text-muted">—</span>
                        </td>
                        <td th:text="${brand.name}"></td>
                        <td th:text="${brand.description}"></td>
                        <td>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox"
                                       th:checked="${brand.active}"
                                       th:data-href="@{/admin/vehicle/attribute-setup/brand/status(id=${brand.id},status=${!brand.active},currentStatus=${status})}"
                                       onclick="window.location=this.dataset.href"/>
                            </div>
                        </td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{'/admin/vehicle/attribute-setup/brand/' + ${brand.id} + '/edit'}"
                                   class="btn btn-sm btn-outline-info"><i class="bi bi-pencil-fill"></i></a>
                                <form th:action="@{'/admin/vehicle/attribute-setup/brand/' + ${brand.id}}"
                                      method="post" class="d-inline">
                                    <input type="hidden" name="_method" value="DELETE"/>
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Delete this brand?')">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${brands.content.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-4">No brands found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${brands.totalPages > 1}">
                <ul class="pagination justify-content-end mb-0">
                    <li class="page-item" th:classappend="${brands.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/vehicle/attribute-setup/brand(status=${status},search=${search},page=${brands.number - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, brands.totalPages - 1)}"
                        th:classappend="${i == brands.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/vehicle/attribute-setup/brand(status=${status},search=${search},page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${brands.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/vehicle/attribute-setup/brand(status=${status},search=${search},page=${brands.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
</body>
</html>
