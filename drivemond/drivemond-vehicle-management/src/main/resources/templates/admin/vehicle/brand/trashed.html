<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Deleted Brands')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
    <div class="d-flex justify-content-between mb-4">
        <h2>Deleted Brands</h2>
        <a th:href="@{/admin/vehicle/attribute-setup/brand}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr><th>#</th><th>Name</th><th>Deleted At</th><th class="text-center">Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="brand, iter : ${brands.content}">
                    <td th:text="${iter.count}"></td>
                    <td th:text="${brand.name}"></td>
                    <td th:text="${#temporals.format(brand.deletedAt, 'dd MMM yyyy')}"></td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{'/admin/vehicle/attribute-setup/brand/' + ${brand.id} + '/restore'}"
                               class="btn btn-sm btn-outline-success"
                               onclick="return confirm('Restore this brand?')">
                                <i class="bi bi-arrow-repeat"></i> Restore
                            </a>
                            <form th:action="@{'/admin/vehicle/attribute-setup/brand/' + ${brand.id} + '/permanent'}"
                                  method="post" class="d-inline">
                                <input type="hidden" name="_method" value="DELETE"/>
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Permanently delete?')">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${brands.content.isEmpty()}">
                    <td colspan="4" class="text-center text-muted py-4">No deleted brands.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
