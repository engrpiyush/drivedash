<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Edit Model')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
    <div class="d-flex justify-content-between mb-4">
        <h2>Edit Model</h2>
        <a th:href="@{/admin/vehicle/attribute-setup/model}" class="btn btn-outline-secondary btn-sm">Back</a>
    </div>
    <div class="card">
        <div class="card-body">
            <form th:action="@{'/admin/vehicle/attribute-setup/model/' + ${vehicleModel.id}}"
                  method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="_method" value="PUT"/>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Brand *</label>
                        <select name="brandId" class="form-select" required>
                            <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"
                                    th:selected="${b.id == vehicleModel.brandId}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Model Name *</label>
                        <input type="text" name="name" class="form-control"
                               th:value="${vehicleModel.name}" required/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Engine *</label>
                        <input type="text" name="engine" class="form-control"
                               th:value="${vehicleModel.engine}" required/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Seat Capacity</label>
                        <input type="number" name="seatCapacity" class="form-control"
                               th:value="${vehicleModel.seatCapacity}" min="1"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Max Weight (kg)</label>
                        <input type="number" step="0.01" name="maximumWeight" class="form-control"
                               th:value="${vehicleModel.maximumWeight}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Hatch Bag Capacity</label>
                        <input type="number" name="hatchBagCapacity" class="form-control"
                               th:value="${vehicleModel.hatchBagCapacity}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Description</label>
                        <input type="text" name="description" class="form-control"
                               th:value="${vehicleModel.description}"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Image (leave blank to keep current)</label>
                        <input type="file" name="image" class="form-control" accept="image/png"/>
                        <img th:if="${vehicleModel.image != null}"
                             th:src="@{'/uploads/' + ${vehicleModel.image}}"
                             alt="current" class="mt-2 rounded" style="height:60px;"/>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Update Model</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
