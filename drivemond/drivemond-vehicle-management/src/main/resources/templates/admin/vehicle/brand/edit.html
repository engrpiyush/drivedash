<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Edit Brand')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2>Edit Brand</h2>
        <a th:href="@{/admin/vehicle/attribute-setup/brand}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>
    <div class="card">
        <div class="card-body">
            <form th:action="@{'/admin/vehicle/attribute-setup/brand/' + ${brand.id}}"
                  method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="_method" value="PUT"/>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Brand Name</label>
                        <input type="text" name="name" class="form-control" th:value="${brand.name}" required/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Description</label>
                        <input type="text" name="description" class="form-control"
                               th:value="${brand.description}" required/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Brand Image (leave blank to keep current)</label>
                        <input type="file" name="image" class="form-control" accept="image/png"/>
                        <img th:if="${brand.image != null}"
                             th:src="@{'/uploads/' + ${brand.image}}"
                             alt="current" class="mt-2 rounded" style="height:60px;"/>
                    </div>
                </div>
                <div class="mt-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Update Brand</button>
                    <a th:href="@{/admin/vehicle/attribute-setup/brand}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
