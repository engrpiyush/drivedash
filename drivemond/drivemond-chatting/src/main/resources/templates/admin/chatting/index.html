<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Chat Monitor')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Chat Monitor</h2>
        <span class="badge bg-success fs-6" id="wsStatus">
            <i class="bi bi-broadcast"></i> WebSocket Active
        </span>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Stats row -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                        <i class="bi bi-chat-dots fs-4 text-primary"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Total Channels</div>
                        <div class="fs-5 fw-bold" th:text="${channels.totalElements}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-info bg-opacity-10 p-3">
                        <i class="bi bi-people fs-4 text-info"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Active Trips with Chat</div>
                        <div class="fs-5 fw-bold" th:text="${channels.totalElements}">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Channel list -->
    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between mb-3">
                <h5 class="mb-0">Active Chat Channels</h5>
                <span class="text-muted small">
                    Total: <strong th:text="${channels.totalElements}">0</strong>
                </span>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Channel ID</th>
                        <th>Trip / Parcel</th>
                        <th>Type</th>
                        <th>Participants</th>
                        <th>Last Activity</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ch, iter : ${channels.content}">
                        <td th:text="${channels.number * channels.size + iter.count}"></td>
                        <td>
                            <code class="small" th:text="${ch.id}"></code>
                        </td>
                        <td>
                            <code class="small" th:text="${ch.channelableId}"></code>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${ch.channelableType == 'parcel'} ? 'bg-info text-dark' : 'bg-primary'"
                                  th:text="${ch.channelableType != null ? ch.channelableType.replace('_', ' ') : '—'}"></span>
                        </td>
                        <td>
                            <span th:if="${memberMap != null and memberMap.containsKey(ch.id)}"
                                  th:text="${memberMap[ch.id]}"></span>
                            <span th:unless="${memberMap != null and memberMap.containsKey(ch.id)}"
                                  class="text-muted">—</span>
                        </td>
                        <td th:text="${#temporals.format(ch.updatedAt, 'dd MMM yyyy HH:mm')}"></td>
                    </tr>
                    <tr th:if="${channels.content.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-4">No chat channels found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${channels.totalPages > 1}">
                <ul class="pagination justify-content-end mb-0">
                    <li class="page-item" th:classappend="${channels.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/chatting(page=${channels.number - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, channels.totalPages - 1)}"
                        th:classappend="${i == channels.number} ? 'active'">
                        <a class="page-link" th:text="${i + 1}"
                           th:href="@{/admin/chatting(page=${i})}"></a>
                    </li>
                    <li class="page-item" th:classappend="${channels.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/chatting(page=${channels.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
</body>
</html>
