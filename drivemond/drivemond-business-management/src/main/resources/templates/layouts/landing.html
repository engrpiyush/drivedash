<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title + ' — ' + (businessName ?: 'DriveMond')}">DriveMond</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root { --brand: #0d6efd; }
        body { font-family: 'Segoe UI', sans-serif; }
        .navbar-brand img { height: 38px; object-fit: contain; }
        .hero { background: linear-gradient(135deg, var(--brand) 0%, #0a58ca 100%); color: #fff; padding: 6rem 0; }
        .hero h1 { font-size: 3rem; font-weight: 700; }
        .stat-card { border-radius: 12px; padding: 1.8rem; text-align: center; background: #f8f9fa; }
        .stat-card .value { font-size: 2.5rem; font-weight: 700; color: var(--brand); }
        .testimonial-card { border-radius: 12px; border: 1px solid #e9ecef; padding: 1.5rem; height: 100%; }
        .stars { color: #ffc107; }
        footer { background: #212529; color: #adb5bd; padding: 3rem 0; }
        footer a { color: #adb5bd; text-decoration: none; }
        footer a:hover { color: #fff; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">
            <img th:if="${businessLogo}" th:src="@{${businessLogo}}" alt="Logo">
            <span th:unless="${businessLogo}" class="fw-bold text-primary"
                  th:text="${businessName ?: 'DriveMond'}">DriveMond</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/about-us">About</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact-us">Contact</a></li>
                <li class="nav-item"><a class="nav-link" href="/privacy">Privacy</a></li>
                <li class="nav-item"><a class="nav-link" href="/terms">Terms</a></li>
                <li class="nav-item ms-2">
                    <a class="btn btn-primary btn-sm px-3" href="/admin/dashboard">Admin Login</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Page content -->
<th:block th:replace="${content}"/>

<!-- Footer -->
<footer>
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="fw-bold text-white mb-2" th:text="${businessName ?: 'DriveMond'}">DriveMond</div>
                <p class="small">Your trusted ride-sharing and logistics platform.</p>
                <div class="d-flex gap-2 mt-3">
                    <a th:each="sl : ${socialLinks}"
                       th:href="${sl.link}" target="_blank" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-link"></i> <span th:text="${sl.name}">Social</span>
                    </a>
                </div>
            </div>
            <div class="col-lg-2">
                <div class="text-white fw-semibold mb-2">Quick Links</div>
                <ul class="list-unstyled small">
                    <li><a href="/">Home</a></li>
                    <li><a href="/about-us">About</a></li>
                    <li><a href="/contact-us">Contact</a></li>
                    <li><a href="/privacy">Privacy Policy</a></li>
                    <li><a href="/terms">Terms &amp; Conditions</a></li>
                </ul>
            </div>
        </div>
        <hr class="mt-4 mb-3" style="border-color: #495057;">
        <p class="small text-center mb-0">
            &copy; <span th:text="${#dates.year(#dates.createNow())}">2024</span>
            <span th:text="${businessName ?: 'DriveMond'}">DriveMond</span>. All rights reserved.
        </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
