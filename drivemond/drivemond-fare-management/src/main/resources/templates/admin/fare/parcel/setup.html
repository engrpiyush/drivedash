<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/admin :: head('Parcel Delivery Fare Setup')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Parcel Delivery Fare Setup</h2>
        <a th:href="@{/admin/fare/parcel}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <form th:action="@{'/admin/fare/parcel/' + ${zone.id} + '/setup'}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <h5 class="text-primary text-uppercase mb-4">
                    Parcel Delivery Fare — <span th:text="${zone.name}"></span> Zone
                </h5>

                <div class="row gy-4">
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Base Fare</label>
                        <input type="number" class="form-control" name="baseFare" step="0.01" min="0"
                               th:value="${fare != null ? fare.baseFare : 0}" required/>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Fare Per Km</label>
                        <input type="number" class="form-control" name="baseFarePerKm" step="0.01" min="0"
                               th:value="${fare != null ? fare.baseFarePerKm : 0}" required/>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Cancellation Fee (%)</label>
                        <input type="number" class="form-control" name="cancellationFeePercent"
                               step="0.01" min="0" max="100"
                               th:value="${fare != null ? fare.cancellationFeePercent : 0}" required/>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="form-label">Min Cancellation Fee</label>
                        <input type="number" class="form-control" name="minCancellationFee" step="0.01" min="0"
                               th:value="${fare != null ? fare.minCancellationFee : 0}" required/>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <button type="submit" class="btn btn-primary">Save Fare</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
